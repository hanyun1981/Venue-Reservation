        // 🔧 部門權限對應表（預設值，作為 fallback）

        // 實際使用的規則存在 Firestore settings/main.deptVenueRules，由超級管理員可在網頁編輯
        const DEFAULT_DEPT_VENUE_RULES = {

        // 角色定義
        const ROLE_OPTIONS = [

        const ROLE_LABEL = {

        const periods = [

            // 午餐時段也開放預約（id 改為一般字串 'L'，讓所有 lunch 特例都不會生效）
            { id: "L", time: "12:00-13:00", name: "Lunch Time" },
            { id: 5, time: "13:10-14:00", name: "Period 5" }, { id: 6, time: "14:10-15:00", name: "Period 6" },
            { id: 7, time: "15:20-16:10", name: "Period 7" }, { id: 8, time: "16:20-17:10", name: "Period 8" },
            // 課後時段：放學後活動
            { id: "after", time: "16:10 之後", name: "課後 After" }
        ];

        const baseDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        const ACTIVITY_CENTER_NAME = "活動中心";
        const activityCenterAreas = [
            { id: 'stage', label: '舞台' },
            { id: 'court', label: '球場' }
        ];
        // 預約／登記表單的 Class/Dept 選項（按學校單位）
        const classOptions = [
            "中學部體育",
            "中學部活動",
            "雙語部體育",
            "雙語部活動",
            "國小部體育",
            "國小部活動",
            "總務處",
            "Other (Specify)"
        ];

        const getTimestamp = () => new Date().toLocaleString('en-US', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        const isActivityCenter = (cartName) => cartName === ACTIVITY_CENTER_NAME;
        const getVenueAreas = (cartName) => isActivityCenter(cartName) ? activityCenterAreas : [{ id: 'main', label: '' }];
        const getSlotAreaLabel = (areaId) => (activityCenterAreas.find(a => a.id === areaId)?.label || '');
        const buildSlotId = (week, dayIdx, periodId, areaId = 'main') => {
            const base = `w${week}_d${dayIdx}_p${periodId}`;
            return areaId && areaId !== 'main' ? `${base}~${areaId}` : base;
        };
        const getBaseSlotId = (slotId) => String(slotId || '').split('~')[0];
        const parseSlotId = (slotId) => {
            const [base, areaId = 'main'] = String(slotId || '').split('~');
            const match = base.match(/^w(\d+)_d(\d+)_p(.+)$/);
            if (!match) return null;
            return {
                week: parseInt(match[1]),
                dayIdx: parseInt(match[2]),
                periodId: match[3],
                areaId,
                areaLabel: getSlotAreaLabel(areaId)
            };
        };

        function App() {
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [dbRefs, setDbRefs] = useState(null);
            
            const [alertModal, setAlertModal] = useState({ isOpen: false, message: '' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

            const showAlert = (message) => setAlertModal({ isOpen: true, message });
            const showConfirm = (message, onConfirm) => setConfirmModal({ isOpen: true, message, onConfirm });

            const [currentView, setCurrentView] = useState('home');
            const [viewHistory, setViewHistory] = useState(['home']);
            const [activeFilter, setActiveFilter] = useState('All');
            const [activeLocationFilter, setActiveLocationFilter] = useState('All'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCart, setSelectedCart] = useState(null);
            const [adminTab, setAdminTab] = useState('carts');
            
            // 🔧 學期設定已移除：改用固定虛擬框架支撐 week-based slot ID
            // 2020-01-06 是星期一，作為「Week 1 起始日」基準。
            // totalWeeks = 520 (~10 年) 等同無限制，避免任何使用上的卡關。
            // maxAdvanceWeeks = 520 等同無提前預約限制。
            // 全年度任何日期都可預約。
            const semesterConfig = useMemo(() => ({
                startDate: '2020-01-06',
                totalWeeks: 520,
                maxAdvanceWeeks: 520
            }), []);
            const [emailConfig, setEmailConfig] = useState({
                webAppUrl: GAS_CONFIG.WEB_APP_URL,
                appUrl: GAS_CONFIG.APP_URL
            });
            const [tempEmailConfig, setTempEmailConfig] = useState({
                webAppUrl: GAS_CONFIG.WEB_APP_URL,
                appUrl: GAS_CONFIG.APP_URL
            });

            const [currentRealWeek, setCurrentRealWeek] = useState(1);
            const [allowSaturday, setAllowSaturday] = useState(true);
            // 改用「年月日」選擇器：selectedDate 是 source of truth，
            // selectedWeek / selectedDayIdx 由 selectedDate 推算（見下方 useMemo）
            const [selectedDate, setSelectedDate] = useState(() => {
                const t = new Date();
                return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`;
            });
            // 一週開放週一到週日（共 7 天），不再使用 Saturday toggle
            const currentDays = baseDays;

            const [cartData, setCartData] = useState({});
            const [usersDB, setUsersDB] = useState({}); 
            const [activityLogs, setActivityLogs] = useState([]); 
            
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [authMode, setAuthMode] = useState('login');
            
            const [adminAddUserModal, setAdminAddUserModal] = useState({ isOpen: false });
            const [addUserForm, setAddUserForm] = useState({ name: '', email: '', classType: '中學部體育', customClass: '', role: 'user' });

            const [bookingModal, setBookingModal] = useState({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false, isPast: false });
            const [bookForm, setBookForm] = useState({ classType: '', customClass: '' });
            const [editBookForm, setEditBookForm] = useState({ name: '', email: '', classType: '', customClass: '' });
            const [editCartModal, setEditCartModal] = useState({ isOpen: false, cartName: null, data: null });
            // 編輯場地時暫存被選為「場地審核者」的 email 陣列
            const [editCartManagers, setEditCartManagers] = useState([]);
            // 編輯場地時暫存被選為「場地登記者」的 email 陣列
            const [editCartRegistrants, setEditCartRegistrants] = useState([]);
            const [printSelection, setPrintSelection] = useState([]);

            const [recurringLocks, setRecurringLocks] = useState([]);
            const [lockModal, setLockModal] = useState({ isOpen: false, lockId: null, data: null });

            // 🔧 部門權限規則（從 Firestore 載入，預設 fallback 到 DEFAULT_DEPT_VENUE_RULES）
            const [deptVenueRules, setDeptVenueRules] = useState(DEFAULT_DEPT_VENUE_RULES);
            const [deptRulesModal, setDeptRulesModal] = useState({ isOpen: false });
            // 編輯時的暫存狀態（深拷貝自 deptVenueRules）
            const [tempDeptRules, setTempDeptRules] = useState(null);

            // 🔧 批次重複預約表單
            const [batchBookingForm, setBatchBookingForm] = useState({
                cartName: '活動中心',
                startDate: '2026-05-11',
                endDate: '2026-06-30'
            });

            const [isBatchMode, setIsBatchMode] = useState(false);
            const [batchSelection, setBatchSelection] = useState([]);
            const [myBookingsView, setMyBookingsView] = useState('list');
            const [myBookingsTab, setMyBookingsTab] = useState('upcoming');
            const [myBookingsStatusTab, setMyBookingsStatusTab] = useState('all');

            const changeView = (newView) => {
                if (newView === currentView) return;
                setViewHistory(prev => [...prev, newView]);
                setCurrentView(newView);
            };

            const goBack = () => {
                if (viewHistory.length > 1) {
                    const newHistory = [...viewHistory];
                    newHistory.pop();
                    setViewHistory(newHistory);
                    setCurrentView(newHistory[newHistory.length - 1]);
                } else {
                    setCurrentView('home');
                }
            };

            const goHome = () => {
                setViewHistory(['home']);
                setCurrentView('home');
            };

            // 🔧 FIX [安全]: 移除 signInAnonymously，改為僅 Google 登入
        // 原本每個訪客都會建立匿名帳號，導致 Firebase Auth 充滿無用帳號，
        // 且匿名帳號也能通過 rules 的 isAuthenticated() 讀寫資料。
        // 現在改為：頁面載入 → 顯示登入畫面 → Google 登入後才能存取 Firestore。
        // onAuthStateChanged 負責在頁面重新整理時自動恢復 Google session。
        useEffect(() => {
                const initFirebase = async () => {
                    const fb = window.fbModules;
                    const app = fb.initializeApp(firebaseConfig);
                    const auth = fb.getAuth(app);
                    const db = fb.getFirestore(app);

                    const getCol = (colName) => isCanvasEnv
                        ? fb.collection(db, 'artifacts', appId, 'public', 'data', colName)
                        : fb.collection(db, colName);

                    const getDocRef = (colName, docId) => isCanvasEnv
                        ? fb.doc(db, 'artifacts', appId, 'public', 'data', colName, String(docId))
                        : fb.doc(db, colName, String(docId));

                    const refs = { getCol, getDocRef, db, auth, fb };
                    setDbRefs(refs);

                    // Canvas 環境使用 Custom Token
                    if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            console.error("Auth Error:", e);
                            setFirebaseReady('auth-error');
                            return;
                        }
                    }

                    // 🔧 處理 signInWithRedirect 回來的結果（fallback 流程用）
                    // 若沒走過 redirect 流程，這裡會回傳 null，不會出錯。
                    try {
                        await fb.getRedirectResult(auth);
                    } catch (e) {
                        console.error("Redirect result error:", e);
                    }

                    // 監聽 Auth 狀態：處理頁面重整時的 session 恢復
                    fb.onAuthStateChanged(auth, async (user) => {
                        if (user && user.email) {
                            // 統一小寫，避免 Google 回傳 email 大小寫與 Firestore doc id 不一致
                            const emailLower = (user.email || '').trim().toLowerCase();
                            // 硬編碼的 SUPER_ADMIN_EMAIL 永遠是超級管理員（即使資料庫沒有此帳號）
                            if (emailLower === SUPER_ADMIN_EMAIL.toLowerCase()) {
                                setIsAdmin(true);
                                setCurrentUser({ name: 'System Admin', email: SUPER_ADMIN_EMAIL, defaultClass: 'Admin', customClass: '', role: 'super_admin' });
                            } else {
                                try {
                                    const userDocRef = refs.getDocRef('users', emailLower);
                                    const userDoc = await refs.fb.getDoc(userDocRef);
                                    if (userDoc.exists()) {
                                        const udata = userDoc.data();
                                        setCurrentUser(udata);
                                        setIsAdmin(udata.role === 'super_admin');
                                    } else {
                                        // 白名單沒有此帳號（可能是大小寫問題或真的沒登錄），登出
                                        console.warn(`Session restore: user ${emailLower} not found in whitelist`);
                                        await fb.signOut(auth);
                                    }
                                } catch (e) {
                                    console.error("Session restore error:", e);
                                }
                            }
                        }
                        // 不管有沒有 session，都設為 ready（讓登入畫面能顯示）
                        setFirebaseReady(true);
                    });
                };

                if (window.fbModules) initFirebase();
                else window.addEventListener('firebaseLoaded', initFirebase);
            }, []);

            // 🔧 FIX [安全]: Cart & Settings 訂閱改為「登入後才啟動」
            // 原本匿名用戶就能觸發 onSnapshot 讀取所有推車資料。
            // 現在加上 currentUser || isAdmin 條件，確保只有通過 Google 登入的用戶才會訂閱。
            useEffect(() => {
                if (!firebaseReady || firebaseReady === 'auth-error' || !dbRefs) return;
                if (!currentUser && !isAdmin) return;

                const unsubCarts = dbRefs.fb.onSnapshot(dbRefs.getCol('carts'), (snap) => {
                    const newCarts = {};
                    snap.forEach(d => { newCarts[d.id] = d.data(); });
                    if (newCarts["重量訓練室"]) {
                        newCarts["重量訓練室"] = { ...newCarts["重量訓練室"], location: "學餐對面" };
                    }

                    // 永遠先把 Firestore 拿到的資料寫進 state（不論空不空）
                    setCartData(newCarts);

                    // 若 Firestore 是空的、且還沒嘗試過種子化，就嘗試寫入預設 3 個場地
                    if (snap.empty && !window.__seededCarts) {
                        window.__seededCarts = true;
                        Object.entries(initialData).forEach(([k, v]) =>
                            dbRefs.fb.setDoc(dbRefs.getDocRef('carts', k), v).catch(e => {
                                console.warn("Seed cart failed (Firestore rules?):", k, e);
                            })
                        );
                    }
                }, err => console.error("Firestore Error:", err));

                const unsubSettings = dbRefs.fb.onSnapshot(dbRefs.getDocRef('settings', 'main'), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        // semesterConfig 不再從 Firestore 讀取，使用固定常數（全年度可預約）
                        if (data.allowSaturday !== undefined) setAllowSaturday(data.allowSaturday);
                        if (data.emailConfig) {
                            const nextEmailConfig = {
                                webAppUrl: data.emailConfig.webAppUrl || GAS_CONFIG.WEB_APP_URL,
                                appUrl: data.emailConfig.appUrl || GAS_CONFIG.APP_URL
                            };
                            setEmailConfig(nextEmailConfig);
                            setTempEmailConfig(nextEmailConfig);
                        }
                        setRecurringLocks(Array.isArray(data.recurringLocks) ? data.recurringLocks : []);
                        // 🔧 部門權限規則：若 Firestore 有就用 Firestore 的，否則用預設
                        if (data.deptVenueRules && typeof data.deptVenueRules === 'object') {
                            setDeptVenueRules(data.deptVenueRules);
                        } else {
                            setDeptVenueRules(DEFAULT_DEPT_VENUE_RULES);
                        }
                    } else {
                        dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), {
                            emailConfig: {
                                webAppUrl: GAS_CONFIG.WEB_APP_URL,
                                appUrl: GAS_CONFIG.APP_URL
                            },
                            allowSaturday: false
                        }).catch(e => {});
                    }
                }, err => console.error("Firestore Error:", err));

                return () => { unsubCarts(); unsubSettings(); };
            }, [firebaseReady, dbRefs, currentUser, isAdmin]);

            // Users 訂閱：所有已登入使用者都訂閱
            // 場地管理員、一般使用者也需要 users 資料，才能顯示「審核者姓名」、寄信時帶上申請人姓名等。
            // 安全性：請在 Firestore Rules 限制只有登入者能讀，且 role 欄位只有 super_admin 可寫。
            useEffect(() => {
                if (!dbRefs || (!currentUser && !isAdmin)) return;

                const unsubUsers = dbRefs.fb.onSnapshot(dbRefs.getCol('users'), (snap) => {
                    const newUsers = {};
                    snap.forEach(d => { newUsers[d.id] = d.data(); });

                    if (snap.empty && !window.__seededUsers && isAdmin) {
                        window.__seededUsers = true;
                        Object.entries(initialUsers).forEach(([k, v]) => dbRefs.fb.setDoc(dbRefs.getDocRef('users', k), v).catch(e => {}));
                    } else {
                        setUsersDB(newUsers);
                    }
                });

                return () => { unsubUsers(); };
            }, [dbRefs, isAdmin, currentUser]);

            // 🔧 自動套用預設權限（只在超級管理員登入後執行一次）
            // 規則：
            //   • 預設使用者（initialUsers 裡的）若不存在白名單就補上去
            //   • 場地若沒有任何審核者，就套用 DEFAULT_VENUE_MANAGERS 預設值
            //   • 已存在的使用者 / 已有審核者的場地都不會被覆蓋（保留你後來手動的調整）
            useEffect(() => {
                if (!dbRefs || !isAdmin) return;
                if (window.__defaultPermsApplied) return;
                window.__defaultPermsApplied = true;

                (async () => {
                    try {
                        // 補預設使用者
                        for (const [email, userData] of Object.entries(initialUsers)) {
                            const ref = dbRefs.getDocRef('users', email);
                            const doc = await dbRefs.fb.getDoc(ref);
                            if (!doc.exists()) {
                                await dbRefs.fb.setDoc(ref, userData);
                                console.log('[預設權限] 新增使用者：', email, '→', userData.role);
                            }
                        }

                        // 補預設場地審核者（只在場地存在且 managerEmails 為空時）
                        for (const [cartName, defaultManagers] of Object.entries(DEFAULT_VENUE_MANAGERS)) {
                            const ref = dbRefs.getDocRef('carts', cartName);
                            const doc = await dbRefs.fb.getDoc(ref);
                            if (doc.exists()) {
                                const data = doc.data();
                                const current = Array.isArray(data.managerEmails) ? data.managerEmails.filter(Boolean) : [];
                                if (current.length === 0) {
                                    await dbRefs.fb.updateDoc(ref, { managerEmails: defaultManagers });
                                    console.log('[預設權限] 場地指派審核者：', cartName, '→', defaultManagers.join(', '));
                                }
                            }
                        }
                    } catch (err) {
                        console.error('[預設權限] 套用失敗：', err);
                    }
                })();
            }, [dbRefs, isAdmin]);

            // 🔧 FIX [效能]: Logs 改為「懶載入」— 只在管理員切到 logs tab 時才訂閱
            // 原本管理員一登入就 onSnapshot 訂閱 100 筆 logs（即使在看其他 tab），
            // 每次有人操作都會觸發 snapshot，導致 Firestore 讀取次數飆高。
            // 現在只在 adminTab === 'logs' 時才啟動即時訂閱，離開 tab 自動取消訂閱。
            useEffect(() => {
                if (!dbRefs || !isAdmin || adminTab !== 'logs') {
                    return;
                }

                const logsQuery = dbRefs.fb.query(
                    dbRefs.getCol('logs'),
                    dbRefs.fb.orderBy('createdAt', 'desc'),
                    dbRefs.fb.limit(100)
                );
                const unsubLogs = dbRefs.fb.onSnapshot(logsQuery, (snap) => {
                    let newLogs = [];
                    snap.forEach(d => { newLogs.push({ id: d.id, ...d.data() }); });
                    setActivityLogs(newLogs);
                });

                return () => { unsubLogs(); };
            }, [dbRefs, isAdmin, adminTab]);

            // 計算「現在這一刻是學期第幾週」，用於判斷預約是否在過去 / 是否超過提前預約上限
            useEffect(() => {
                if (firebaseReady && firebaseReady !== 'auth-error') {
                    const now = new Date();
                    const [year, month, day] = semesterConfig.startDate.split('-').map(Number);
                    const start = new Date(year, month - 1, day);
                    start.setHours(0, 0, 0, 0);
                    now.setHours(0, 0, 0, 0);

                    const diffTime = now.getTime() - start.getTime();
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    let currentWeekCalc = Math.floor(diffDays / 7) + 1;

                    if (currentWeekCalc < 1) currentWeekCalc = 1;
                    if (currentWeekCalc > semesterConfig.totalWeeks) currentWeekCalc = semesterConfig.totalWeeks;

                    setCurrentRealWeek(currentWeekCalc);
                }
            }, [firebaseReady, semesterConfig]);

            // 切換日期時清空批次選擇
            useEffect(() => {
                setBatchSelection([]);
            }, [selectedDate]);

            // =================================================================
            // 🔧 FIX [效能]: 用 useMemo 快取計算結果
            // 原本每次 render（包含與預約無關的 UI 操作如開關 modal）都重新跑
            // 排序/過濾/我的預約計算。現在只在依賴資料真正變更時才重算。
            // =================================================================
            // 🔧 若 Firestore 沒資料（連不上 / 被 rules 擋 / 尚未種子化）
            // 就 fallback 用 initialData，確保使用者永遠看得到「活動中心 / 重量訓練室 / 多功能訓練室」三個場地。
            const sortedAllCarts = useMemo(() => {
                const source = Object.keys(cartData).length > 0 ? cartData : initialData;
                return Object.entries(source).sort((a, b) => (a[1].order || 0) - (b[1].order || 0));
            }, [cartData]);

            // 🔧 由「日期」推算「第幾週」：以學期起始日為基準，每 7 天為一週
            // 若日期超出學期範圍會 clamp 到 [1, totalWeeks]
            const selectedWeek = useMemo(() => {
                if (!selectedDate || !semesterConfig.startDate) return 1;
                const [y, m, d] = selectedDate.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                const [sy, sm, sd] = semesterConfig.startDate.split('-').map(Number);
                const start = new Date(sy, sm - 1, sd);
                date.setHours(0, 0, 0, 0);
                start.setHours(0, 0, 0, 0);
                const diffDays = Math.floor((date.getTime() - start.getTime()) / 86400000);
                let w = Math.floor(diffDays / 7) + 1;
                if (w < 1) w = 1;
                if (w > semesterConfig.totalWeeks) w = semesterConfig.totalWeeks;
                return w;
            }, [selectedDate, semesterConfig]);

            // 由「日期」推算對應的星期幾 index：0=Mon ~ 6=Sun
            const selectedDayIdx = useMemo(() => {
                if (!selectedDate) return 0;
                const [y, m, d] = selectedDate.split('-').map(Number);
                const w = new Date(y, m - 1, d).getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
                return w === 0 ? 6 : w - 1;
            }, [selectedDate]);

            // 🔧 部門 → user 列表（用於「權限狀態總覽」面板）
            const usersByDepartment = useMemo(() => {
                const map = {};
                Object.values(usersDB).forEach(u => {
                    const dept = (u.defaultClass || '').trim() || '（無部門）';
                    if (!map[dept]) map[dept] = [];
                    map[dept].push(u);
                });
                return map;
            }, [usersDB]);

            const filteredCarts = useMemo(() =>
                sortedAllCarts
                    .filter(([name, data]) => activeFilter === 'All' || data.type === activeFilter)
                    .filter(([name, data]) => activeLocationFilter === 'All' || data.location === activeLocationFilter)
                    .filter(([name, data]) => name.toLowerCase().includes(searchQuery.toLowerCase()) || (data.notes && data.notes.toLowerCase().includes(searchQuery.toLowerCase()))),
                [sortedAllCarts, activeFilter, activeLocationFilter, searchQuery]
            );

            const locations = useMemo(() =>
                ['All', ...Array.from(new Set(Object.values(cartData).map(c => c.location).filter(Boolean)))],
                [cartData]
            );

            const moveCart = async (cartName, direction) => {
                const sortedNames = sortedAllCarts.map(arr => arr[0]);
                const idx = sortedNames.indexOf(cartName);
                if (direction === 'up' && idx > 0) [sortedNames[idx - 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx - 1]];
                else if (direction === 'down' && idx < sortedNames.length - 1) [sortedNames[idx + 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx + 1]];
                else return;
                
                try {
                    const batch = dbRefs.fb.writeBatch(dbRefs.db);
                    let hasChanges = false;
                    for (let i = 0; i < sortedNames.length; i++) {
                        const cName = sortedNames[i];
                        if ((cartData[cName].order || 0) !== i) {
                            batch.update(dbRefs.getDocRef('carts', cName), { order: i });
                            hasChanges = true;
                        }
                    }
                    if (hasChanges) await batch.commit();
                } catch (e) {
                    console.error("Move error:", e);
                    showAlert("Failed to reorder carts.");
                }
            };

            const getIcon = (type) => {
                if (type === '綜合場地') return <div className="w-12 h-12 bg-duo-blue/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-basketball text-duo-blue text-2xl"></i></div>;
                if (type === '重訓室') return <div className="w-12 h-12 bg-duo-red/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-dumbbell text-duo-red text-2xl"></i></div>;
                if (type === '多功能訓練室') return <div className="w-12 h-12 bg-duo-green/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-person-running text-duo-green text-2xl"></i></div>;
                return <div className="w-12 h-12 bg-duo-yellow/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-location-dot text-duo-yellow text-2xl"></i></div>;
            };

            const addLog = async (action, cart, details, specificUser = null) => {
                const operator = isAdmin ? 'Admin' : (currentUser ? currentUser.name : 'Unknown');
                const id = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}`;
                const newLog = { 
                    time: getTimestamp(), 
                    operator: specificUser || operator, 
                    action, 
                    cart, 
                    details,
                    createdAt: dbRefs.fb.serverTimestamp() 
                };
                if(dbRefs) await dbRefs.fb.setDoc(dbRefs.getDocRef('logs', id), newLog);
            };

            const getWeekDateRange = (weekNum, includeSat) => {
                const start = new Date(semesterConfig.startDate);
                if (isNaN(start.getTime())) return "Invalid Date";
                start.setDate(start.getDate() + (weekNum - 1) * 7);
                const end = new Date(start);
                // 週一到週日，共 7 天 → 結束日 = 起始日 + 6
                end.setDate(end.getDate() + 6);
                return `${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}`;
            };

            const getDateForDayIdx = (weekNum, dayIdx) => {
                if (!semesterConfig.startDate) return "";
                const [year, month, day] = semesterConfig.startDate.split('-').map(Number);
                const date = new Date(year, month - 1, day);
                if (isNaN(date.getTime())) return "";
                date.setDate(date.getDate() + (weekNum - 1) * 7 + dayIdx);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            };

            // ============================================================
            // 🔧 多筆競爭預約：一個 slot 可同時存在多筆 booking（一筆 approved + N 筆 pending）
            // 資料結構：schedule[slotId] 可以是
            //   - 舊版單一 object（向後相容，自動視為單元素 array）
            //   - 新版 array of bookings（每筆有獨立 bookingId 與 status）
            // ============================================================

            // 取出 slot 的所有 booking，永遠回傳 array（空則回 []）
            const getSlotBookings = (schedule, slotId) => {
                const v = schedule?.[slotId];
                if (!v) return [];
                if (Array.isArray(v)) return v.filter(Boolean);
                // 舊版單筆 → 包成 array，補 bookingId 以便後續操作
                return [{ ...v, bookingId: v.bookingId || `legacy_${slotId}` }];
            };

            // 取「主要顯示用」booking：優先 approved；其次第一筆 pending；其餘 null
            const getPrimaryBooking = (schedule, slotId) => {
                const list = getSlotBookings(schedule, slotId);
                return list.find(b => b.status === 'approved') || list[0] || null;
            };

            // 該 slot 是否已有 approved booking
            const hasApprovedBooking = (schedule, slotId) => {
                return getSlotBookings(schedule, slotId).some(b => b.status === 'approved');
            };

            // 該 slot 中該使用者是否已有 booking（同一人不能重複申請同一 slot）
            const userHasBookingInSlot = (schedule, slotId, email) => {
                const lower = (email || '').trim().toLowerCase();
                return getSlotBookings(schedule, slotId).some(b =>
                    ((b.ownerEmail || b.email || '').trim().toLowerCase()) === lower
                );
            };

            // 產生新的 bookingId
            const newBookingId = () => `b_${Date.now()}_${Math.random().toString(36).substring(2, 9)}`;

            const handleSaturdayToggle = async (e) => {
                const newVal = e.target.checked;
                setAllowSaturday(newVal); 
                if (dbRefs) {
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { allowSaturday: newVal }, { merge: true });
                    addLog(newVal ? "Enable Saturday" : "Disable Saturday", "System", "Admin toggled Saturday booking setting");
                }
            };

            // 🔧 共用：以 email 直接登入（不經 Google OAuth）
            // 用於 Canvas / file:// / about:srcdoc 等無法跑 OAuth 的環境，
            // 也用於正式環境下「Google 登入失敗」時的備援按鈕。
            const loginWithEmail = async (rawEmail) => {
                if (!rawEmail) return;
                const email = rawEmail.trim().toLowerCase();
                if (!email.includes('@')) {
                    showAlert("請輸入有效的 Email 格式。");
                    return;
                }
                if (email === SUPER_ADMIN_EMAIL.toLowerCase()) {
                    setIsAdmin(true);
                    setCurrentUser({ name: 'System Admin', email: SUPER_ADMIN_EMAIL, defaultClass: 'Admin', customClass: '', role: 'super_admin' });
                    goHome();
                    return;
                }
                try {
                    const userDocRef = dbRefs.getDocRef('users', email);
                    const userDoc = await dbRefs.fb.getDoc(userDocRef);
                    if (userDoc.exists()) {
                        const udata = userDoc.data();
                        setCurrentUser(udata);
                        setIsAdmin(udata.role === 'super_admin');
                        goHome();
                    } else {
                        showAlert(`Access Denied.\n你的 Email（${email}）不在白名單中。\n請聯絡系統管理員。`);
                    }
                } catch (err) {
                    console.error("Email login error:", err);
                    showAlert("登入失敗，請檢查網路連線後再試。");
                }
            };

            // 本機 / 預覽登入：跳出 prompt 讓使用者輸入白名單 email
            const handleEmailLogin = async () => {
                const inputEmail = prompt(`【白名單登入】\n\n請輸入已加入白名單的 Email：\n(最高權限管理員請輸入 ${SUPER_ADMIN_EMAIL})`, '');
                if (inputEmail) await loginWithEmail(inputEmail);
            };

            // 🔧 FIX [安全]: Google 登入流程
            // signInWithPopup 成功後，onAuthStateChanged 會自動觸發 session 恢復。
            // 對無法跑 OAuth 的環境（Canvas / file://）改走 email 流程。
            // 對 popup 失敗的情況自動 fallback 到 redirect，並針對常見錯誤碼給出明確提示。
            const handleGoogleLogin = async () => {
                // 環境不支援 OAuth → 直接走 email 流程
                if (useEmailOnlyLogin) {
                    return handleEmailLogin();
                }

                try {
                    const provider = new dbRefs.fb.GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    const result = await dbRefs.fb.signInWithPopup(dbRefs.auth, provider);
                    const userEmail = (result.user.email || '').trim().toLowerCase(); // 統一小寫

                    // onAuthStateChanged 會自動處理 session 恢復，
                    // 但如果白名單中沒有此帳號，需要立即登出並顯示錯誤。
                    if (userEmail !== SUPER_ADMIN_EMAIL.toLowerCase()) {
                        const userDocRef = dbRefs.getDocRef('users', userEmail);
                        const userDoc = await dbRefs.fb.getDoc(userDocRef);
                        if (!userDoc.exists()) {
                            await dbRefs.fb.signOut(dbRefs.auth);
                            setCurrentUser(null);
                            setIsAdmin(false);
                            showAlert(`Access Denied.\n你的 Email（${userEmail}）不在白名單中。\n請聯絡系統管理員加入後再登入。\n\n💡 提示：請確認名單中的 Email 是「全小寫」，本系統一律以小寫比對。`);
                        }
                    }
                    // 如果驗證通過，onAuthStateChanged 已經設好 currentUser & isAdmin
                } catch (error) {
                    console.error("Google login error:", error);
                    const code = error?.code || '';

                    if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') {
                        return; // 使用者主動取消，不顯示錯誤
                    }

                    // popup 被擋 → 自動嘗試 redirect 流程
                    if (code === 'auth/popup-blocked') {
                        try {
                            const provider = new dbRefs.fb.GoogleAuthProvider();
                            provider.setCustomParameters({ prompt: 'select_account' });
                            await dbRefs.fb.signInWithRedirect(dbRefs.auth, provider);
                            return;
                        } catch (redirectErr) {
                            console.error("Redirect fallback failed:", redirectErr);
                        }
                    }

                    // 針對常見錯誤碼給出明確中文提示
                    let msg;
                    switch (code) {
                        case 'auth/unauthorized-domain':
                            msg = `❌ 未授權的網域\n\n目前網址（${window.location.origin}）尚未加入 Firebase 允許清單。\n\n修正方式：\n1. 前往 Firebase Console → Authentication → Settings → Authorized domains\n2. 加入此網域\n\n如果你只是要本機測試，請重新按登入按鈕並輸入白名單帳號。`;
                            break;
                        case 'auth/operation-not-allowed':
                            msg = `❌ Google 登入未啟用\n\n請到 Firebase Console → Authentication → Sign-in method 啟用 Google provider。`;
                            break;
                        case 'auth/network-request-failed':
                            msg = `❌ 網路連線失敗\n\n請檢查你的網路後再試。`;
                            break;
                        case 'auth/popup-blocked':
                            msg = `❌ 瀏覽器擋下了 Google 登入彈窗\n\n請允許此網站的彈窗後再試。`;
                            break;
                        case 'auth/internal-error':
                            msg = `❌ Firebase 內部錯誤\n\n可能是 Auth 設定不完整，請檢查 Firebase Console 設定。`;
                            break;
                        default:
                            msg = `❌ Google 登入失敗\n\n錯誤代碼：${code || 'unknown'}\n${error.message || ''}`;
                    }
                    showAlert(msg);
                }
            };

            const handleAdminAddUser = async (e) => {
                e.preventDefault();
                // 統一小寫 + 去前後空白，避免 Firestore doc id 與登入時查找的 key 不一致
                const email = addUserForm.email.trim().toLowerCase();
                if (!email.includes('@')) {
                    return showAlert("請輸入有效的 Email 格式。");
                }
                try {
                    const existingDoc = await dbRefs.fb.getDoc(dbRefs.getDocRef('users', email));
                    if (existingDoc.exists()) {
                        return showAlert("此 Email 已存在白名單中！");
                    }
                    const newUser = {
                        name: addUserForm.name.trim(),
                        email: email,
                        defaultClass: addUserForm.classType,
                        customClass: addUserForm.customClass,
                        role: addUserForm.role || 'user'
                    };
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('users', email), newUser);
                    addLog("Add User", "System", `新增使用者：${email}（${ROLE_LABEL[newUser.role] || newUser.role}）`);
                    showAlert(`✅ 使用者已加入白名單！\n\nEmail：${email}\n（已統一轉為小寫）`);
                    setAddUserForm({ name: '', email: '', classType: '中學部體育', customClass: '', role: 'user' });
                    setAdminAddUserModal({ isOpen: false });
                } catch(err) {
                    console.error(err);
                    showAlert("新增失敗，請稍後再試。\n" + (err.message || err));
                }
            };

            // 🔧 計算批次預約的所有 slot
            // 走訪每一週 + 每一個 preset，把每筆 (week, dayIdx) 換算成實際日期，
            // 若該日期落在 [startDate, endDate] 範圍內就為每個 periodId 建一個 slot
            const computeBatchBookingSlots = (form) => {
                const slots = [];
                if (!form.startDate || !form.endDate || !semesterConfig.startDate) return slots;

                const [sy, sm, sd] = form.startDate.split('-').map(Number);
                const [ey, em, ed] = form.endDate.split('-').map(Number);
                const start = new Date(sy, sm - 1, sd); start.setHours(0, 0, 0, 0);
                const end   = new Date(ey, em - 1, ed); end.setHours(0, 0, 0, 0);

                const [ssy, ssm, ssd] = semesterConfig.startDate.split('-').map(Number);
                const semStart = new Date(ssy, ssm - 1, ssd); semStart.setHours(0, 0, 0, 0);

                for (let w = 1; w <= semesterConfig.totalWeeks; w++) {
                    for (const preset of BATCH_BOOKING_PRESETS) {
                        const dt = new Date(semStart);
                        dt.setDate(dt.getDate() + (w - 1) * 7 + preset.dayIdx);
                        if (dt >= start && dt <= end) {
                            const dateStr = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
                            for (const pId of preset.periodIds) {
                                slots.push({
                                    slotId: `w${w}_d${preset.dayIdx}_p${pId}`,
                                    week: w,
                                    dayIdx: preset.dayIdx,
                                    periodId: pId,
                                    date: dateStr,
                                    dayName: currentDays[preset.dayIdx],
                                    periodName: (periods.find(p => String(p.id) === String(pId)) || {}).name || `P${pId}`,
                                    className: preset.className,
                                    timeLabel: preset.timeLabel
                                });
                            }
                        }
                    }
                }
                return slots;
            };

            // 🔧 執行批次建立預約：transaction 讀進場地 schedule，逐筆判斷是否衝突，最後一次 update
            const handleExecuteBatchBooking = async () => {
                if (!isAdmin) return showAlert("只有超級管理員可以執行此操作。");
                if (!dbRefs) return showAlert("Firebase 尚未就緒。");
                if (!batchBookingForm.cartName) return showAlert("請選擇場地。");

                const slots = computeBatchBookingSlots(batchBookingForm);
                if (slots.length === 0) {
                    return showAlert("日期範圍內沒有任何要建立的時段（可能日期超出學期範圍）。");
                }

                showConfirm(
                    `將為「${batchBookingForm.cartName}」批次建立 ${slots.length} 筆預約\n\n日期範圍：${batchBookingForm.startDate} ～ ${batchBookingForm.endDate}\n\n衝突的時段（已被預約／鎖定）會自動跳過。\n確定執行嗎？`,
                    async () => {
                        const cartRef = dbRefs.getDocRef('carts', batchBookingForm.cartName);
                        try {
                            const result = { added: 0, skippedExisting: 0, skippedLocked: 0, byDay: {} };

                            await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                                const cartDoc = await transaction.get(cartRef);
                                if (!cartDoc.exists()) throw "CART_NOT_FOUND";

                                const data = cartDoc.data();
                                const schedule = { ...(data.schedule || {}) };

                                for (const s of slots) {
                                    // 檢查 recurring lock
                                    if (getLockForSlot(batchBookingForm.cartName, s.week, s.dayIdx, s.periodId)) {
                                        result.skippedLocked++;
                                        continue;
                                    }
                                    // 檢查已預約
                                    if (schedule[s.slotId]) {
                                        result.skippedExisting++;
                                        continue;
                                    }
                                    schedule[s.slotId] = {
                                        name:       s.className,
                                        email:      SUPER_ADMIN_EMAIL,
                                        ownerEmail: SUPER_ADMIN_EMAIL,
                                        className:  s.className,
                                        status:     'approved',
                                        createdAt:  Date.now(),
                                        batchTag:   'recurring-2026-05-11_06-30'
                                    };
                                    result.added++;
                                    const key = `${s.dayName} ${s.className}`;
                                    result.byDay[key] = (result.byDay[key] || 0) + 1;
                                }

                                transaction.update(cartRef, { schedule });
                            });

                            addLog("Batch Recurring Booking", batchBookingForm.cartName,
                                `${batchBookingForm.startDate} ~ ${batchBookingForm.endDate} 共建立 ${result.added} 筆（跳過 ${result.skippedExisting} 筆既有 / ${result.skippedLocked} 筆鎖定）`
                            );

                            const breakdown = Object.entries(result.byDay)
                                .map(([k, v]) => `   ${k}：${v} 筆`)
                                .join('\n');
                            showAlert(
                                `✅ 批次預約完成！\n\n` +
                                `場地：${batchBookingForm.cartName}\n` +
                                `日期範圍：${batchBookingForm.startDate} ～ ${batchBookingForm.endDate}\n\n` +
                                `📌 建立：${result.added} 筆\n` +
                                (result.skippedExisting > 0 ? `⏭ 跳過已預約：${result.skippedExisting} 筆\n` : '') +
                                (result.skippedLocked > 0 ? `🔒 跳過已鎖定：${result.skippedLocked} 筆\n` : '') +
                                `\n依「日期+類別」拆分：\n${breakdown}`
                            );
                        } catch (err) {
                            console.error('批次預約錯誤', err);
                            if (err === "CART_NOT_FOUND") showAlert(`找不到場地「${batchBookingForm.cartName}」，請先確認場地名稱正確。`);
                            else showAlert("批次建立失敗：" + (err.message || err));
                        }
                    }
                );
            };

            // 🔧 開啟部門權限規則編輯器（深拷貝目前規則作為暫存）
            const openDeptRulesEditor = () => {
                if (!isAdmin) return showAlert("只有超級管理員可以編輯規則。");
                setTempDeptRules(JSON.parse(JSON.stringify(deptVenueRules || {})));
                setDeptRulesModal({ isOpen: true });
            };

            // 儲存編輯後的規則到 Firestore
            const saveDeptRules = async () => {
                if (!tempDeptRules) return;
                try {
                    // 簡單驗證 + 清理
                    const cleaned = {};
                    for (const [cart, rule] of Object.entries(tempDeptRules)) {
                        const cartName = (cart || '').trim();
                        if (!cartName) continue;
                        cleaned[cartName] = {
                            managerDepts:    Array.isArray(rule.managerDepts)    ? rule.managerDepts.filter(Boolean)    : [],
                            registrantDepts: Array.isArray(rule.registrantDepts) ? rule.registrantDepts.filter(Boolean) : []
                        };
                    }
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { deptVenueRules: cleaned }, { merge: true });
                    addLog("Update Dept Rules", "System", `已更新 ${Object.keys(cleaned).length} 個場地的部門對應`);
                    setDeptRulesModal({ isOpen: false });
                    setTempDeptRules(null);
                    showAlert("✅ 部門權限規則已儲存。\n\n如要實際套用到場地的審查者／登記者名單，請按下「套用部門權限對應表」按鈕。");
                } catch (err) {
                    console.error("Save dept rules error:", err);
                    showAlert("儲存失敗：" + (err.message || err));
                }
            };

            // 恢復成程式碼中的預設規則（只重置編輯區，按儲存才生效）
            const resetDeptRulesToDefault = () => {
                showConfirm("⚠️ 將編輯區的規則重置為「程式碼預設值」（尚未儲存，需要再按儲存按鈕才生效）。\n\n確定繼續嗎？", () => {
                    setTempDeptRules(JSON.parse(JSON.stringify(DEFAULT_DEPT_VENUE_RULES)));
                });
            };

            // 🔧 套用部門權限對應表
            // 根據 deptVenueRules 與每位 user 的 defaultClass，
            // 自動計算並覆寫每個場地的 managerEmails / registrantEmails
            // 會覆寫現有設定（按下前會先 confirm）
            const handleApplyDepartmentPermissions = async () => {
                if (!isAdmin) return showAlert("只有超級管理員可以執行此操作。");
                if (!dbRefs) return showAlert("Firebase 尚未就緒。");
                if (Object.keys(usersDB).length === 0) {
                    return showAlert("白名單為空，無法套用部門權限。請先到 Admin → Users 加入使用者。");
                }

                showConfirm(
                    "⚠️ 將根據每位 user 的「預設班級／部門」自動計算並覆寫所有場地的審查者與登記者名單。\n\n現有設定會被取代，確定繼續嗎？",
                    async () => {
                        // 先按 defaultClass 分組所有使用者的 email
                        const usersByDept = {};
                        Object.values(usersDB).forEach(u => {
                            const dept = (u.defaultClass || '').trim();
                            if (!dept) return;
                            if (!usersByDept[dept]) usersByDept[dept] = [];
                            const em = (u.email || '').trim().toLowerCase();
                            if (em) usersByDept[dept].push(em);
                        });

                        const result = { applied: [], emptyDepts: {}, missingCarts: [], failed: [] };

                        for (const [cartName, perms] of Object.entries(deptVenueRules)) {
                            // 先檢查場地是否存在
                            try {
                                const cartRef = dbRefs.getDocRef('carts', cartName);
                                const cartDoc = await dbRefs.fb.getDoc(cartRef);
                                if (!cartDoc.exists()) {
                                    result.missingCarts.push(cartName);
                                    continue;
                                }

                                // 收集審查者 emails
                                const managerEmails = [];
                                const emptyMgrDepts = [];
                                for (const dept of perms.managerDepts) {
                                    const emails = usersByDept[dept] || [];
                                    if (emails.length === 0) emptyMgrDepts.push(dept);
                                    managerEmails.push(...emails);
                                }

                                // 收集登記者 emails
                                const registrantEmails = [];
                                const emptyRegDepts = [];
                                for (const dept of perms.registrantDepts) {
                                    const emails = usersByDept[dept] || [];
                                    if (emails.length === 0) emptyRegDepts.push(dept);
                                    registrantEmails.push(...emails);
                                }

                                // 去重
                                const uniqueManagers    = Array.from(new Set(managerEmails));
                                const uniqueRegistrants = Array.from(new Set(registrantEmails));

                                // 同一場地內若有人同時被列為審查者+登記者，優先保留審查者身份（從登記者移除）
                                const cleanRegistrants = uniqueRegistrants.filter(e => !uniqueManagers.includes(e));
                                const overlapped = uniqueRegistrants.filter(e => uniqueManagers.includes(e));

                                await dbRefs.fb.updateDoc(cartRef, {
                                    managerEmails: uniqueManagers,
                                    registrantEmails: cleanRegistrants
                                });

                                result.applied.push({
                                    cart: cartName,
                                    managers: uniqueManagers,
                                    registrants: cleanRegistrants,
                                    overlapped
                                });

                                if (emptyMgrDepts.length || emptyRegDepts.length) {
                                    result.emptyDepts[cartName] = {
                                        managers: emptyMgrDepts,
                                        registrants: emptyRegDepts
                                    };
                                }
                            } catch (err) {
                                console.error(`套用 ${cartName} 失敗`, err);
                                result.failed.push(`${cartName}（${err.message || err}）`);
                            }
                        }

                        addLog("Apply Dept Permissions", "System", `Updated ${result.applied.length} carts`);

                        // 組詳細報告
                        const lines = ['📋 部門權限套用結果\n'];
                        if (result.applied.length) {
                            result.applied.forEach(a => {
                                lines.push(`✅ ${a.cart}`);
                                lines.push(`   審查者 (${a.managers.length})：${a.managers.join('、') || '（無）'}`);
                                lines.push(`   登記者 (${a.registrants.length})：${a.registrants.join('、') || '（無）'}`);
                                if (a.overlapped.length) {
                                    lines.push(`   ℹ️ 重疊人員已優先設為審查者：${a.overlapped.join('、')}`);
                                }
                            });
                        }
                        if (Object.keys(result.emptyDepts).length) {
                            lines.push('\n⚠️ 以下部門目前沒有對應 user，自動略過：');
                            Object.entries(result.emptyDepts).forEach(([cart, info]) => {
                                const m = info.managers.length ? `審查者[${info.managers.join('/')}]` : '';
                                const r = info.registrants.length ? `登記者[${info.registrants.join('/')}]` : '';
                                lines.push(`   ${cart} → ${[m, r].filter(Boolean).join('、')}`);
                            });
                            lines.push('（之後在 Admin → Users 加入該部門的人後，重新按一次按鈕即可補上）');
                        }
                        if (result.missingCarts.length) {
                            lines.push(`\n⚠️ 找不到場地（請先建立）：${result.missingCarts.join('、')}`);
                        }
                        if (result.failed.length) {
                            lines.push(`\n❌ 失敗：\n${result.failed.join('\n')}`);
                        }
                        showAlert(lines.join('\n'));
                    }
                );
            };

            // 🔧 修復白名單大小寫：把所有非全小寫的 user 文件搬到全小寫的 doc id
            // 解決：之前用大寫加進來的帳號，登入時找不到（因為登入會自動轉小寫查找）
            const handleNormalizeUserEmails = async () => {
                if (!isAdmin) return showAlert("只有超級管理員可以執行此操作。");
                if (!dbRefs) return showAlert("Firebase 尚未就緒。");

                const result = { renamed: [], skipped: [], failed: [] };

                try {
                    const snap = await dbRefs.fb.getDoc(dbRefs.getDocRef('users', '__placeholder__')); // dummy to ensure refs are valid
                    // 列出所有 user
                    const allUsers = Object.entries(usersDB);
                    if (allUsers.length === 0) {
                        return showAlert("目前白名單是空的，沒有需要修復的帳號。");
                    }

                    for (const [docId, udata] of allUsers) {
                        const lower = (docId || '').trim().toLowerCase();
                        if (lower === docId) {
                            result.skipped.push(docId);
                            continue;
                        }
                        try {
                            // 寫入小寫版本
                            const newData = { ...udata, email: lower };
                            await dbRefs.fb.setDoc(dbRefs.getDocRef('users', lower), newData);
                            // 刪除舊的（大寫版本）
                            await dbRefs.fb.deleteDoc(dbRefs.getDocRef('users', docId));
                            result.renamed.push(`${docId} → ${lower}`);
                        } catch (err) {
                            result.failed.push(`${docId}（${err.message || err}）`);
                        }
                    }

                    let lines = ['📋 白名單修復結果\n'];
                    if (result.renamed.length) lines.push(`✅ 已轉小寫（${result.renamed.length}）：\n${result.renamed.join('\n')}`);
                    if (result.skipped.length) lines.push(`\nℹ️ 已是小寫無需處理（${result.skipped.length}）：\n${result.skipped.join(', ')}`);
                    if (result.failed.length)  lines.push(`\n❌ 失敗：\n${result.failed.join('\n')}`);
                    showAlert(lines.join('\n'));
                } catch (err) {
                    console.error('修復白名單失敗', err);
                    showAlert("修復失敗：" + (err.message || err));
                }
            };

            // 編輯既有使用者的角色
            const handleUpdateUserRole = async (email, newRole) => {
                try {
                    await dbRefs.fb.updateDoc(dbRefs.getDocRef('users', email), { role: newRole });
                    addLog("Update Role", "System", `${email} → ${ROLE_LABEL[newRole] || newRole}`);
                } catch (err) {
                    console.error(err);
                    showAlert("更新角色失敗，請稍後再試。");
                }
            };

            const handleEmailConfigSave = async (e) => {
                e.preventDefault();
                const nextEmailConfig = {
                    webAppUrl: (tempEmailConfig.webAppUrl || '').trim(),
                    appUrl: (tempEmailConfig.appUrl || '').trim()
                };
                if (!nextEmailConfig.webAppUrl) {
                    showAlert("請填入 GAS Web App URL。");
                    return;
                }
                if (!nextEmailConfig.webAppUrl.startsWith('https://script.google.com/macros/s/')) {
                    showAlert("GAS Web App URL 格式看起來不正確，請貼上以 https://script.google.com/macros/s/ 開頭、/exec 結尾的網址。");
                    return;
                }
                await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { emailConfig: nextEmailConfig }, { merge: true });
                setEmailConfig(nextEmailConfig);
                setTempEmailConfig(nextEmailConfig);
                addLog("Update Email Config", "System", `GAS URL updated, APP URL: ${nextEmailConfig.appUrl || 'current page'}`);
                showAlert("Email 設定已更新。");
            };

            const handleTestEmailUrls = async () => {
                const webAppUrl = (tempEmailConfig.webAppUrl || '').trim();
                const appUrl = (tempEmailConfig.appUrl || '').trim();

                if (!webAppUrl) {
                    showAlert("請先填入 GAS Web App URL。");
                    return;
                }
                if (!webAppUrl.startsWith('https://script.google.com/macros/s/')) {
                    showAlert("GAS Web App URL 格式看起來不正確，請貼上 Google Apps Script 部署後的 /exec 網址。");
                    return;
                }

                let gasMessage = '';
                try {
                    const res = await fetch(webAppUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({
                            secret: GAS_CONFIG.API_SECRET,
                            action: 'ping'
                        }),
                        redirect: 'follow'
                    });
                    const text = await res.text();
                    const result = JSON.parse(text);
                    gasMessage = result.ok
                        ? '✅ GAS URL 測試成功，可以連線。'
                        : `❌ GAS URL 有回應，但密鑰或程式可能不正確：${result.error || '未知錯誤'}`;
                } catch (err) {
                    gasMessage = `❌ GAS URL 測試失敗：${err.message || err}`;
                }

                if (!appUrl) {
                    showAlert(`${gasMessage}\n\nAPP_URL 未填，email 審核按鈕會使用目前網頁網址。`);
                    return;
                }

                try {
                    new URL(appUrl);
                } catch (err) {
                    showAlert(`${gasMessage}\n\n❌ APP_URL 格式不正確，請確認網址是否完整。`);
                    return;
                }

                showConfirm(
                    `${gasMessage}\n\n✅ APP_URL 格式正常。\n\n要開啟 APP_URL 測試公開網站是否能正常載入嗎？`,
                    () => window.open(appUrl, '_blank', 'noopener,noreferrer')
                );
            };

            const handleClearSemesterData = () => {
                showConfirm("⚠️ WARNING: Are you sure you want to clear ALL booking records?\n\nThis action cannot be undone!", async () => {
                    try {
                        const batch = dbRefs.fb.writeBatch(dbRefs.db);
                        for (const cartName of Object.keys(cartData)) {
                            batch.update(dbRefs.getDocRef('carts', cartName), { schedule: {} });
                        }
                        await batch.commit();

                        // 清完資料後，把日期跳回學期第一天，方便管理員確認
                        setSelectedDate(semesterConfig.startDate);
                        addLog("Clear Data", "System", "Admin cleared all booking records (New Semester)");
                        showAlert("All booking data has been cleared!");
                    } catch (error) {
                        console.error("Batch clear error:", error);
                        showAlert("Failed to clear all data due to a network error. Please try again.");
                    }
                });
            };

            const getLockForSlot = (cartName, week, dayIdx, periodId) => {
                return recurringLocks.find(lock =>
                    lock.cartName === cartName &&
                    Number(lock.dayIdx) === Number(dayIdx) &&
                    String(lock.periodId) === String(periodId) &&
                    week >= Number(lock.startWeek) &&
                    week < Number(lock.startWeek) + Number(lock.weeks)
                ) || null;
            };

            const saveLock = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const lockData = {
                    id: lockModal.lockId || `lock_${Date.now()}_${Math.random().toString(36).substring(2, 7)}`,
                    name: formData.get('name').trim() || 'Locked',
                    cartName: formData.get('cartName'),
                    dayIdx: Number(formData.get('dayIdx')),
                    periodId: formData.get('periodId'),
                    startWeek: Number(formData.get('startWeek')),
                    weeks: Number(formData.get('weeks'))
                };

                if (!lockData.cartName) { showAlert("請選擇一個場地。"); return; }
                if (lockData.weeks < 1) { showAlert("持續週數必須至少 1 週。"); return; }

                try {
                    const newLocks = lockModal.lockId
                        ? recurringLocks.map(l => l.id === lockModal.lockId ? lockData : l)
                        : [...recurringLocks, lockData];

                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { recurringLocks: newLocks }, { merge: true });

                    const cartRef = dbRefs.getDocRef('carts', lockData.cartName);
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) return;
                        const schedule = cartDoc.data().schedule || {};
                        let changed = false;
                        for (let w = lockData.startWeek; w < lockData.startWeek + lockData.weeks; w++) {
                            const baseSlotId = buildSlotId(w, lockData.dayIdx, lockData.periodId);
                            Object.keys(schedule).forEach(slotId => {
                                if (getBaseSlotId(slotId) === baseSlotId) {
                                    delete schedule[slotId];
                                    changed = true;
                                }
                            });
                        }
                        if (changed) transaction.update(cartRef, { schedule });
                    });

                    addLog(lockModal.lockId ? "Edit Lock" : "Add Lock", lockData.cartName, `${lockData.name} · Wk${lockData.startWeek}-${lockData.startWeek + lockData.weeks - 1} · ${currentDays[lockData.dayIdx] || `Day${lockData.dayIdx}`} P${lockData.periodId}`);
                    setLockModal({ isOpen: false, lockId: null, data: null });
                } catch (err) {
                    console.error("Save lock error:", err);
                    showAlert("儲存鎖定失敗，請稍後再試。");
                }
            };

            const deleteLock = (lockId) => {
                const lock = recurringLocks.find(l => l.id === lockId);
                if (!lock) return;
                showConfirm(`確定要刪除鎖定「${lock.name}」嗎？`, async () => {
                    try {
                        const newLocks = recurringLocks.filter(l => l.id !== lockId);
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { recurringLocks: newLocks }, { merge: true });
                        addLog("Delete Lock", lock.cartName, `${lock.name} · Wk${lock.startWeek}-${lock.startWeek + lock.weeks - 1}`);
                    } catch (err) {
                        console.error("Delete lock error:", err);
                        showAlert("刪除鎖定失敗，請稍後再試。");
                    }
                });
            };

            const deleteUser = (email) => {
                showConfirm(`Delete user ${usersDB[email].name} from whitelist?\nThey will no longer be able to log in.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('users', email));
                    addLog("Delete User", "System", `Admin removed account from whitelist: ${email}`);
                });
            };

            const todayDay = new Date().getDay();
            const currentRealDayIdx = todayDay === 0 ? 6 : todayDay - 1;

            // 🔧 通用 GAS Web App 呼叫函式
            // 所有寄信功能都走這個。
            // showErrors=true 時若失敗會跳 alert 視窗（測試用、後台動作用 false 才不會打斷使用者）。
            //
            // ⚠️ GAS Web App 的 fetch 必須用 'text/plain' Content-Type 才能跳過 CORS preflight。
            // GAS 端會自己 parse JSON。
            const callGAS = useCallback(async (action, extraData, showErrors = false) => {
                const webAppUrl = (emailConfig.webAppUrl || GAS_CONFIG.WEB_APP_URL || '').trim();
                if (!webAppUrl || webAppUrl === 'YOUR_WEB_APP_URL') {
                    const msg = "GAS Web App URL 未設定，跳過寄信。";
                    console.warn(msg, action);
                    if (showErrors) showAlert(`📧 ${msg}`);
                    return { ok: false, error: msg };
                }
                const payload = {
                    secret: GAS_CONFIG.API_SECRET,
                    action,
                    ...extraData
                };
                try {
                    const res = await fetch(webAppUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload),
                        redirect: 'follow'
                    });
                    const text = await res.text();

                    // GAS 失敗時可能回傳 HTML（例如未授權、未公開、被擋），先嘗試解析 JSON
                    let result;
                    try {
                        result = JSON.parse(text);
                    } catch (parseErr) {
                        console.error(`GAS [${action}] returned non-JSON:`, text.slice(0, 800));
                        const reason = text.includes('Authorization')
                            ? '⚠️ GAS 尚未授權使用 Gmail。請到 GAS 編輯器執行一次 sendTestEmail() 完成授權。'
                            : text.includes('Sign in')
                                ? '⚠️ Web App 部署的「存取權」沒設成「任何人」，請重新部署並選「任何人」。'
                                : `⚠️ GAS 回應不是 JSON，可能是 Web App 設定錯誤或部署失敗。\n\n回應前 200 字：\n${text.slice(0, 200)}`;
                        if (showErrors) showAlert(`📧 寄信失敗\n\n${reason}`);
                        return { ok: false, error: reason };
                    }

                    if (!result.ok) {
                        console.error(`GAS [${action}] error:`, result.error);
                        if (showErrors) showAlert(`📧 寄信失敗（GAS 回報）：${result.error || '未知錯誤'}`);
                    }
                    return result;
                } catch (err) {
                    const msg = `📧 寄信失敗：無法連線到 GAS Web App\n\n${err.message || err}\n\n請確認：\n• WEB_APP_URL 是否正確（要以 /exec 結尾）\n• GAS 部署的「存取權」是否設成「任何人」\n• 部署後是否「儲存新版本」`;
                    console.error(`GAS [${action}] fetch failed:`, err);
                    if (showErrors) showAlert(msg);
                    return { ok: false, error: String(err) };
                }
            }, [showAlert, emailConfig]);

            // 🔧 手動套用預設權限（按鈕觸發版，逐筆顯示結果）
            // 自動 effect 跑過會被 window.__defaultPermsApplied 鎖住，
            // 這個函式會強制重新跑一次，並把每筆操作結果明確列出來給管理員確認。
            const handleApplyDefaultPermissions = async () => {
                if (!isAdmin) {
                    showAlert("只有超級管理員可以執行此操作。");
                    return;
                }
                if (!dbRefs) {
                    showAlert("Firebase 尚未就緒。");
                    return;
                }

                const report = {
                    usersAdded: [], usersExist: [], usersFailed: [],
                    cartsUpdated: [], cartsSkipped: [], cartsMissing: [], cartsFailed: []
                };

                // 1. 補預設使用者
                for (const [email, userData] of Object.entries(initialUsers)) {
                    try {
                        const ref = dbRefs.getDocRef('users', email);
                        const doc = await dbRefs.fb.getDoc(ref);
                        if (!doc.exists()) {
                            await dbRefs.fb.setDoc(ref, userData);
                            report.usersAdded.push(email);
                        } else {
                            report.usersExist.push(email);
                        }
                    } catch (err) {
                        console.error('套用使用者失敗', email, err);
                        report.usersFailed.push(`${email}（${err.message || err}）`);
                    }
                }

                // 2. 補預設場地審核者
                for (const [cartName, defaultManagers] of Object.entries(DEFAULT_VENUE_MANAGERS)) {
                    try {
                        const ref = dbRefs.getDocRef('carts', cartName);
                        const doc = await dbRefs.fb.getDoc(ref);
                        if (!doc.exists()) {
                            report.cartsMissing.push(cartName);
                            continue;
                        }
                        const data = doc.data();
                        const current = Array.isArray(data.managerEmails) ? data.managerEmails.filter(Boolean) : [];
                        if (current.length === 0) {
                            await dbRefs.fb.updateDoc(ref, { managerEmails: defaultManagers });
                            report.cartsUpdated.push(`${cartName} → ${defaultManagers.join(', ')}`);
                        } else {
                            report.cartsSkipped.push(`${cartName}（已有審核者：${current.join(', ')}）`);
                        }
                    } catch (err) {
                        console.error('套用場地失敗', cartName, err);
                        report.cartsFailed.push(`${cartName}（${err.message || err}）`);
                    }
                }

                // 把結果顯示出來
                let lines = ['📋 套用結果\n'];
                lines.push(`【使用者】`);
                if (report.usersAdded.length)  lines.push(`✅ 新增：${report.usersAdded.join(', ')}`);
                if (report.usersExist.length)  lines.push(`ℹ️ 已存在：${report.usersExist.join(', ')}`);
                if (report.usersFailed.length) lines.push(`❌ 失敗：\n${report.usersFailed.join('\n')}`);

                lines.push(`\n【場地審核者】`);
                if (report.cartsUpdated.length) lines.push(`✅ 已指派：\n${report.cartsUpdated.join('\n')}`);
                if (report.cartsSkipped.length) lines.push(`ℹ️ 跳過：\n${report.cartsSkipped.join('\n')}`);
                if (report.cartsMissing.length) lines.push(`⚠️ 場地不存在：${report.cartsMissing.join(', ')}\n（請先建立同名場地，或重新整理觸發 seed）`);
                if (report.cartsFailed.length)  lines.push(`❌ 失敗：\n${report.cartsFailed.join('\n')}`);

                showAlert(lines.join('\n'));
            };

            // 🔧 連線測試：呼叫 GAS 的 ping 端點與 sendTestEmail 端點
            const handleTestEmailConnection = async () => {
                showAlert("正在測試 GAS 連線...");
                // 1. ping 測試（不寄信，只確認連線與 secret 正確）
                const pingResult = await callGAS('ping', {}, true);
                if (!pingResult || !pingResult.ok) return;

                // 2. 真的寄一封測試信給目前登入者
                showConfirm(
                    `✅ GAS 連線成功！\n\n要寄一封測試信給你 (${currentUser.email}) 嗎？`,
                    async () => {
                        const sendResult = await callGAS('sendTestEmail', { to: currentUser.email }, true);
                        if (sendResult && sendResult.ok) {
                            showAlert(`✅ 測試信已送出！\n\n收件者：${currentUser.email}\n請到 Gmail 收件匣確認（也可能在垃圾信件夾）。`);
                        }
                    }
                );
            };

            // 寄送審核通知信給場地管理員（一個或多個）
            // slots: [{ slotId, week, dayName, periodName, slotDate }]
            // GAS 會根據 slotId 為每筆預約生成「核准 / 退回」一鍵按鈕的 URL
            const getAppBaseLink = () => {
                const configuredUrl = (emailConfig.appUrl || GAS_CONFIG.APP_URL || '').trim();
                if (configuredUrl) return configuredUrl.split('?')[0].replace(/\/+$/,'');
                return `${window.location.origin}${window.location.pathname}`;
            };

            const sendApprovalEmail = async ({ managerEmails, cartName, applicantName, applicantEmail, className, slots }) => {
                const emails = (managerEmails || []).filter(Boolean);
                if (emails.length === 0) return;
                const baseLink = getAppBaseLink();
                await callGAS('sendApprovalNotification', {
                    managerEmails: emails,
                    cartName, applicantName, applicantEmail, className,
                    slots: slots || [],
                    baseLink
                });
            };

            // 寄送審核結果信
            // 收件者規則：申請人 + 該場地所有可登記者 + 該場地所有審核者（包含實際審核的那位）
            const sendReviewResultEmail = async ({ decision, applicantEmail, applicantName, registrantEmails, otherManagerEmails, reviewerName, reviewerEmail, cartName, className, week, dayName, periodName, slotDate }) => {
                const uniqueRegistrants = Array.from(new Set((registrantEmails || []).filter(Boolean).map(e => e.toLowerCase())));
                const allReviewers = [...(otherManagerEmails || []), reviewerEmail].filter(Boolean);
                const uniqueReviewers = Array.from(new Set(allReviewers.map(e => e.toLowerCase())));
                await callGAS('sendReviewResult', {
                    decision, // 'approved' | 'rejected'
                    applicantEmail,
                    applicantName,
                    registrantEmails: uniqueRegistrants,
                    otherManagerEmails: uniqueReviewers,
                    reviewerName: reviewerName || '系統管理員',
                    reviewerEmail: reviewerEmail || '',
                    cartName, className, week, dayName, periodName,
                    slotDate: slotDate || ''
                });
            };

            // 判斷目前使用者是否可登記此場地
            // 規則：
            //  - 超級管理員：永遠可以
            //  - 場地若未指定 registrantEmails（空陣列）：所有已登入使用者皆可預約（向後相容）
            //  - 場地若有指定 registrantEmails：必須在名單中
            const canRegisterCart = useCallback((cartName) => {
                if (isAdmin) return true;
                const info = cartData[cartName];
                if (!info || !currentUser) return false;
                const list = Array.isArray(info.registrantEmails) ? info.registrantEmails.filter(Boolean) : [];
                if (list.length === 0) return true;
                const myEmail = (currentUser.email || '').trim().toLowerCase();
                return list.some(e => (e || '').trim().toLowerCase() === myEmail);
            }, [isAdmin, cartData, currentUser]);

            const handleSlotClick = (dayIdx, periodId, existingBooking, areaId = 'main') => {
                // 鎖定時段：不再直接擋下，仍允許申請（會強制變成 pending 走審核流程）
                const lock = getLockForSlot(selectedCart, selectedWeek, dayIdx, periodId);

                const isPastSlot = selectedWeek < currentRealWeek || (selectedWeek === currentRealWeek && dayIdx < currentRealDayIdx);

                // 提前預約限制已移除 — 全年度任何日期都可預約

                if (existingBooking) {
                    setBookingModal({ isOpen: true, dayIdx, periodId, areaId, existingBooking, isEditing: false, isBatch: false, isPast: isPastSlot, lock });
                } else {
                    if (isPastSlot && !isAdmin) {
                        showAlert("⚠️ Cannot book slots in the past!");
                        return;
                    }

                    // 檢查登記者權限
                    if (!canRegisterCart(selectedCart)) {
                        showAlert(`🚫 你不在「${selectedCart}」的場地登記者名單中，無法預約此場地。\n如需預約，請洽系統管理員加入登記者名單。`);
                        return;
                    }

                    if (isBatchMode) {
                        const slotId = buildSlotId(selectedWeek, dayIdx, periodId, areaId);
                        setBatchSelection(prev =>
                            prev.some(s => s.slotId === slotId)
                                ? prev.filter(s => s.slotId !== slotId)
                                : [...prev, { dayIdx, periodId, areaId, slotId, lock }]
                        );
                    } else {
                        setBookForm({ classType: currentUser.defaultClass, customClass: currentUser.customClass });
                        // 如果 slot 已有其他人的 booking → 帶入「競爭預約」資訊
                        const slotId = buildSlotId(selectedWeek, dayIdx, periodId, areaId);
                        const competingList = getSlotBookings(cartData[selectedCart]?.schedule, slotId);
                        const competingPrimary = getPrimaryBooking(cartData[selectedCart]?.schedule, slotId);
                        setBookingModal({
                            isOpen: true, dayIdx, periodId, areaId,
                            existingBooking: null, isEditing: false, isBatch: false, isPast: false, lock,
                            competingWith: competingPrimary,
                            competingCount: competingList.length
                        });
                    }
                }
            };

            const executeBookingTransaction = async (slotsToBook, finalClass) => {
                const cartRef = dbRefs.getDocRef('carts', selectedCart);

                // 預約是否需要審核：除了最高管理員之外，所有登記都需要審核。
                // 審核通知固定寄給最高管理員，並加上該場地設定的審核者。
                const cartInfo = cartData[selectedCart] || {};
                const managerEmails = (Array.isArray(cartInfo.managerEmails) ? cartInfo.managerEmails : []).filter(Boolean);
                const applicantEmailLower = (currentUser.email || '').trim().toLowerCase();
                const reviewManagerEmails = Array.from(new Set([SUPER_ADMIN_EMAIL, ...managerEmails]
                    .filter(Boolean)
                    .map(e => String(e).trim().toLowerCase())
                    .filter(e => e && e !== applicantEmailLower)
                ));
                const needsApproval = !isAdmin;
                const initialStatus = needsApproval ? 'pending' : 'approved';

                // 🔒 鎖定衝突：仍可登記，但會記錄鎖定資訊讓審核者看到
                //    super admin 自己登記時也維持 needsApproval；以下 lock 資訊會塞進 booking 記錄裡
                let hasAnyLockedSlot = false;
                const slotLockMap = {};
                for (const slot of slotsToBook) {
                    const slotLock = getLockForSlot(selectedCart, selectedWeek, slot.dayIdx, slot.periodId);
                    if (slotLock) {
                        hasAnyLockedSlot = true;
                        slotLockMap[slot.slotId] = {
                            id: slotLock.id,
                            name: slotLock.name,
                            startWeek: slotLock.startWeek,
                            weeks: slotLock.weeks
                        };
                    }
                }
                // 鎖定 slot 一律走審核流程（即使 isAdmin 也要明確核准才會覆寫鎖定），確保流程一致
                const effectiveNeedsApproval = needsApproval || hasAnyLockedSlot;
                const effectiveInitialStatus = effectiveNeedsApproval ? 'pending' : 'approved';

                try {
                    let hasCompetingApproved = false;
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";

                        const currentData = cartDoc.data();
                        const currentSchedule = currentData.schedule || {};

                        for (const slot of slotsToBook) {
                            // 取出該 slot 既有的 booking（向後相容單筆 / 陣列）
