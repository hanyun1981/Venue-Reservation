                                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" className="w-6 h-6 mr-3" />
                                            Sign in with Google
                                        </button>
                                    </div>
                                    <div className="text-center mt-4">
                                        <p className="text-xs font-bold text-gray-400">Admin access is automatically granted for authorized accounts.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#ffffff]">
                    <header className="bg-white border-b-2 border-duo-grayBorder sticky top-0 z-50 no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
                            <div className="flex items-center space-x-3 cursor-pointer group" onClick={goHome}>
                                <i className="fa-solid fa-dumbbell text-duo-green text-3xl group-hover:scale-110 transition-transform"></i>
                                <h1 className="text-2xl font-extrabold text-duo-green tracking-tight hidden sm:block">室內運動場地登記表</h1>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <button onClick={() => changeView('print')} className="px-4 py-2.5 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase tracking-wider rounded-2xl shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 active:shadow-none active:translate-y-[4px] transition-all text-xs sm:text-sm">
                                    <i className="fa-solid fa-print sm:mr-1"></i> <span className="hidden sm:inline">Print</span>
                                </button>

                                <button onClick={() => changeView('my-bookings')} className={`px-4 py-2.5 font-extrabold uppercase tracking-wider rounded-2xl transition-all text-xs sm:text-sm ${currentView === 'my-bookings' ? 'bg-duo-blue text-white shadow-[0_4px_0_0_#1899d6] active:shadow-none active:translate-y-[4px]' : 'bg-white border-2 border-duo-grayBorder text-duo-blue shadow-[0_4px_0_0_#e5e5e5] hover:bg-blue-50 active:shadow-none active:translate-y-[4px]'}`}>
                                    <i className="fa-solid fa-calendar-check sm:mr-1"></i> <span className="hidden sm:inline">My Bookings</span>
                                </button>

                                {isAdmin && (
                                    <button onClick={() => { changeView('admin'); setAdminTab('carts'); }} className={`px-4 py-2.5 font-extrabold uppercase tracking-wider rounded-2xl transition-all text-xs sm:text-sm ${currentView === 'admin' ? 'bg-duo-text text-white shadow-[0_4px_0_0_#2b2b2b] active:shadow-none active:translate-y-[4px]' : 'bg-white border-2 border-duo-grayBorder text-duo-text shadow-[0_4px_0_0_#e5e5e5] hover:bg-gray-50 active:shadow-none active:translate-y-[4px]'}`}>
                                        <i className="fa-solid fa-gear sm:mr-1"></i> <span className="hidden sm:inline">Admin</span>
                                    </button>
                                )}
                                
                                <div className="flex items-center ml-2 border-2 border-duo-grayBorder rounded-2xl h-[44px] overflow-hidden bg-duo-grayLight">
                                    <div className="px-4 font-extrabold text-duo-blue text-sm flex items-center h-full max-w-[120px] truncate">
                                        <i className={`fa-solid ${isAdmin ? 'fa-shield-halved text-duo-yellow' : 'fa-user'} mr-2`}></i>
                                        {currentUser.name}
                                    </div>
                                    <button onClick={async () => { await dbRefs.fb.signOut(dbRefs.auth); setCurrentUser(null); setIsAdmin(false); setCartData({}); setActivityLogs([]); setUsersDB({}); }} className="px-3 h-full border-l-2 border-duo-grayBorder text-gray-400 hover:text-duo-red hover:bg-red-50 transition-colors" title="Log Out">
                                        <i className="fa-solid fa-right-from-bracket"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-duo-grayLight border-t-2 border-duo-grayBorder px-4 py-3">
                            <div className="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
                                <div className="flex items-center space-x-3">
                                    <span className="font-extrabold text-duo-text/60 uppercase tracking-wider text-sm">Week:</span>
                                    <div className="relative">
                                        <select value={selectedWeek} onChange={(e) => setSelectedWeek(Number(e.target.value))} className="appearance-none bg-white border-2 border-duo-grayBorder rounded-xl pl-4 pr-10 py-2 text-sm font-extrabold text-duo-blue outline-none cursor-pointer hover:bg-gray-50 transition-colors">
                                            {weeksArray.map(w => (
                                                <option key={w} value={w}>Wk {w} ({getWeekDateRange(w, allowSaturday)})</option>
                                            ))}
                                        </select>
                                        <i className="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-duo-grayBorder pointer-events-none text-xs"></i>
                                    </div>
                                    {!isAdmin && selectedWeek > currentRealWeek + (semesterConfig.maxAdvanceWeeks || 2) && (
                                        <span className="text-xs font-bold text-duo-red bg-red-50 px-2 py-1 rounded-lg border border-red-200"><i className="fa-solid fa-lock mr-1"></i>Exceeds limit</span>
                                    )}
                                </div>
                                {isAdmin && (
                                    <div className="flex items-center">
                                        <label className="flex items-center cursor-pointer space-x-3 text-sm font-extrabold text-duo-text/80 uppercase tracking-wider">
                                            <span>Sat. Booking</span>
                                            <div className="relative">
                                                <input type="checkbox" checked={allowSaturday} onChange={handleSaturdayToggle} className="sr-only" />
                                                <div className={`block w-14 h-8 rounded-full border-2 transition-colors ${allowSaturday ? 'bg-duo-green border-duo-greenDark' : 'bg-duo-grayBorder border-gray-300'}`}></div>
                                                <div className={`dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform ${allowSaturday ? 'transform translate-x-6' : ''}`}></div>
                                            </div>
                                        </label>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8 no-print">
                        
                        {currentView === 'my-bookings' && (
                            <div className="animate-[fadeIn_0.3s_ease-out]">
                                <div className="mb-6 flex items-center justify-between">
                                    <button onClick={goBack} className="text-gray-400 font-extrabold uppercase tracking-wider hover:text-duo-text transition-colors flex items-center border-2 border-duo-grayBorder px-4 py-2 rounded-xl bg-white hover:bg-gray-50">
                                        <i className="fa-solid fa-arrow-left mr-2"></i> Back
                                    </button>
                                </div>
                                <div className="mb-8 border-b-2 border-duo-grayBorder pb-6 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                                    <div>
                                        <h2 className="text-3xl font-extrabold text-duo-text tracking-tight">My Bookings</h2>
                                        <p className="text-gray-500 font-bold mt-2">Manage all your reserved equipment slots here.</p>
                                    </div>
                                    <div className="flex bg-duo-grayLight rounded-xl border-2 border-duo-grayBorder p-1">
                                        <button onClick={() => setMyBookingsView('list')} className={`px-4 py-2 rounded-lg font-extrabold text-sm transition-all ${myBookingsView === 'list' ? 'bg-white shadow-sm text-duo-text' : 'text-gray-400 hover:text-duo-text'}`}><i className="fa-solid fa-list mr-2"></i>List View</button>
                                        <button onClick={() => setMyBookingsView('calendar')} className={`px-4 py-2 rounded-lg font-extrabold text-sm transition-all ${myBookingsView === 'calendar' ? 'bg-white shadow-sm text-duo-text' : 'text-gray-400 hover:text-duo-text'}`}><i className="fa-solid fa-calendar-day mr-2"></i>Calendar</button>
                                    </div>
                                </div>

                                {/* 🔧 待我審核區塊：只有場地管理員會看到 */}
                                {pendingForMe.length > 0 && (
                                    <div className="mb-8 bg-duo-yellow/10 border-2 border-duo-yellow rounded-3xl p-6 animate-[fadeIn_0.3s_ease-out]">
                                        <div className="flex items-center mb-4">
                                            <i className="fa-solid fa-bell text-duo-yellowDark text-2xl mr-3"></i>
                                            <h3 className="text-xl font-extrabold text-duo-text">待我審核（{pendingForMe.length}）</h3>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {pendingForMe.map((p, i) => {
                                                const periodInfo = periods.find(pp => String(pp.id) === String(p.periodId));
                                                return (
                                                    <div key={i} className="bg-white border-2 border-duo-yellow rounded-2xl p-4 flex flex-col">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="font-extrabold text-duo-text">
                                                                <i className="fa-solid fa-cube text-duo-blue mr-2"></i>{p.cartName}
                                                            </div>
                                                            <span className="text-[11px] font-extrabold bg-duo-yellow/20 text-duo-yellowDark px-2 py-0.5 rounded-md uppercase">{p.info.className}</span>
                                                        </div>
                                                        <div className="text-sm font-bold text-gray-500 mb-3 leading-relaxed">
                                                            <div><i className="fa-solid fa-user mr-2 text-gray-400"></i>{p.info.name} <span className="text-xs text-gray-400">({p.info.email})</span></div>
                                                            <div><i className="fa-regular fa-calendar mr-2 text-gray-400"></i>第 {p.week} 週 {currentDays[p.dayIdx]} {periodInfo ? periodInfo.name : `P${p.periodId}`}</div>
                                                        </div>
                                                        <div className="flex gap-2 mt-auto">
                                                            <button onClick={() => reviewBooking(p.cartName, p.slotId, 'rejected')} className="flex-1 bg-white border-2 border-duo-red text-duo-red font-extrabold uppercase py-2 rounded-xl text-sm shadow-[0_3px_0_0_#ea2b2b] active:shadow-none active:translate-y-[3px] transition-all">
                                                                <i className="fa-solid fa-xmark mr-1"></i> 退回
                                                            </button>
                                                            <button onClick={() => reviewBooking(p.cartName, p.slotId, 'approved')} className="flex-[2] bg-duo-green text-white font-extrabold uppercase py-2 rounded-xl text-sm shadow-duo-green active:shadow-none active:translate-y-[3px] transition-all">
                                                                <i className="fa-solid fa-check mr-1"></i> 核准
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}


                                {allMyBookings.length === 0 ? (
                                    <div className="bg-white rounded-3xl border-2 border-duo-grayBorder shadow-duo-card p-12 text-center flex flex-col items-center">
                                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6 border-4 border-white shadow-sm">
                                            <i className="fa-regular fa-face-frown-open text-5xl text-gray-300"></i>
                                        </div>
                                        <h3 className="text-2xl font-extrabold text-duo-text mb-2">No Bookings Yet</h3>
                                        <p className="text-gray-500 font-bold mb-8">You haven't reserved any equipment for your classes.</p>

                    {alertModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[70] backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-2xl max-w-xs w-full p-8 text-center animate-[bounceIn_0.3s_cubic-bezier(0.175,0.885,0.32,1.275)]">
                                <div className="w-20 h-20 bg-blue-50 text-duo-blue rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm">
                                    <i className="fa-solid fa-bell text-4xl"></i>
                                </div>
                                <p className="text-duo-text font-bold mb-8 whitespace-pre-line text-lg leading-relaxed">{alertModal.message}</p>
                                <button onClick={() => setAlertModal({ isOpen: false, message: '' })} className="w-full bg-duo-blue text-white font-extrabold uppercase py-4 rounded-2xl shadow-duo-blue active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-lg">Got it!</button>
                            </div>
                        </div>
                    )}

                    {confirmModal.isOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[70] backdrop-blur-sm">
                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-2xl max-w-sm w-full p-8 text-center animate-[bounceIn_0.3s_cubic-bezier(0.175,0.885,0.32,1.275)]">
                                <div className="w-20 h-20 bg-red-50 text-duo-red rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm">
                                    <i className="fa-solid fa-triangle-exclamation text-4xl"></i>
                                </div>
                                <p className="text-duo-text font-bold mb-8 whitespace-pre-line text-lg leading-relaxed">{confirmModal.message}</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setConfirmModal({ isOpen: false, message: '', onConfirm: null })} className="flex-1 bg-white border-2 border-duo-grayBorder text-gray-400 font-extrabold uppercase py-4 rounded-2xl shadow-duo-gray active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-sm">Cancel</button>
                                    <button onClick={() => { confirmModal.onConfirm(); setConfirmModal({ isOpen: false, message: '', onConfirm: null }); }} className="flex-1 bg-duo-red text-white font-extrabold uppercase py-4 rounded-2xl shadow-duo-red active:shadow-none active:translate-y-[4px] transition-all tracking-wider text-sm">Confirm</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <style>{`
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
