<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>室內運動場地登記表</title>
    
    <!-- 引入 Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- 引入 Tailwind CSS 並設定自訂主題顏色 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        duo: {
                            green: '#58cc02', greenDark: '#58a700',
                            blue: '#1cb0f6', blueDark: '#1899d6',
                            red: '#ff4b4b', redDark: '#ea2b2b',
                            yellow: '#ffc800', yellowDark: '#e5b400',
                            text: '#4b4b4b', grayLight: '#f7f7f7', grayBorder: '#e5e5e5'
                        }
                    },
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    boxShadow: {
                        'duo-green': '0 4px 0 0 #58a700', 'duo-blue': '0 4px 0 0 #1899d6',
                        'duo-red': '0 4px 0 0 #ea2b2b', 'duo-gray': '0 4px 0 0 #e5e5e5',
                        'duo-card': '0 6px 0 0 #e5e5e5',
                    }
                }
            }
        }
    </script>
    
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @media print {
            @page { size: A4 landscape; margin: 10mm; }
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .print-only { display: block !important; width: 100%; }
            .page-break { page-break-after: always; height: 96vh; display: flex; flex-direction: column; }
            table { width: 100%; flex-grow: 1; border-collapse: collapse; table-layout: fixed; }
            th, td { border: 1px solid #000; text-align: center; vertical-align: middle; font-family: sans-serif; word-wrap: break-word; overflow: hidden; }
            th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-weight: bold; }
            .col-period { width: 65px; } 
            .print-lunch { background-color: #e5e7eb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; letter-spacing: 2px; font-size: 14px; }
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>      
</head>
<body class="bg-white font-sans text-duo-text selection:bg-duo-green selection:text-white">
    
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, runTransaction, query, orderBy, limit, serverTimestamp, updateDoc, deleteField, writeBatch } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        window.fbModules = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut,
            getFirestore, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, runTransaction, query, orderBy, limit, serverTimestamp, updateDoc, deleteField, writeBatch
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>

    <script type="text/babel">
        // 🔧 FIX [效能]: 加入 useMemo & useCallback，避免每次 render 重新計算
        const { useState, useEffect, useMemo, useCallback } = React;

        const isCanvasEnv = typeof __firebase_config !== 'undefined';
        const defaultFirebaseConfig = {
            apiKey: "AIzaSyAFXr6AfSXf97k2uckNDrH5vXflhO8VD-s",
            authDomain: "venus-reservation.firebaseapp.com",
            projectId: "venus-reservation",
            storageBucket: "venus-reservation.firebasestorage.app",
            messagingSenderId: "1067791969461",
            appId: "1:1067791969461:web:c4f9760ce9680d4158e2fc",
            measurementId: "G-NG16S5D021"
        };

        // 🔧 Google Apps Script 設定
        // 部署 GAS Web App 後，請填入下方兩個欄位：
        // 1. WEB_APP_URL - 部署後拿到的 https://script.google.com/macros/s/.../exec 連結
        // 2. API_SECRET  - 必須與 GAS 程式碼中的 CONFIG.API_SECRET 完全一致
        const GAS_CONFIG = {
            WEB_APP_URL: 'YOUR_WEB_APP_URL',
            API_SECRET: 'YOUR_API_SECRET'
        };

        const firebaseConfig = isCanvasEnv ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cartreserver-app';

        const initialData = {
            "活動中心": { type: "綜合場地", location: "活動中心", capacity: 200, schedule: {}, notes: "可進行球類、舞蹈、集會等活動", order: 0, managerEmails: [] },
            "重量訓練室": { type: "重訓室", location: "體育館", capacity: 20, schedule: {}, notes: "使用前請先閱讀器材安全須知", order: 1, managerEmails: [] },
            "地下多功能訓練室": { type: "多功能訓練室", location: "地下室", capacity: 30, schedule: {}, order: 2, managerEmails: [] },
        };

        const initialUsers = {
            "bianca@school.edu": { name: "Bianca", email: "bianca@school.edu", defaultClass: "11A", customClass: "", role: "user" },
            "yvonne@school.edu": { name: "Yvonne", email: "yvonne@school.edu", defaultClass: "11B", customClass: "", role: "user" }
        };

        // 角色定義
        const ROLE_OPTIONS = [
            { value: 'user', label: '一般使用者', color: 'gray', desc: '只能預約場地' },
            { value: 'venue_manager', label: '場地管理員', color: 'blue', desc: '可審核被指派的場地' },
            { value: 'super_admin', label: '超級管理員', color: 'yellow', desc: '完整管理權限' }
        ];
        const ROLE_LABEL = {
            'super_admin': '超級管理員',
            'venue_manager': '場地管理員',
            'user': '一般使用者'
        };

        const periods = [
            { id: 1, time: "8:10-9:00", name: "Period 1" }, { id: 2, time: "9:10-10:00", name: "Period 2" },
            { id: 3, time: "10:10-11:00", name: "Period 3" }, { id: 4, time: "11:10-12:00", name: "Period 4" },
            { id: "lunch", time: "12:00-13:00", name: "Lunch Break" },
            { id: 5, time: "13:10-14:00", name: "Period 5" }, { id: 6, time: "14:10-15:00", name: "Period 6" },
            { id: 7, time: "15:20-16:10", name: "Period 7" }, { id: 8, time: "16:20-17:10", name: "Period 8" }
        ];

        const baseDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const classOptions = Array.from({ length: 12 }, (_, i) => [`${i + 1}A`, `${i + 1}B`]).flat();
        classOptions.push("Other (Specify)");

        const getTimestamp = () => new Date().toLocaleString('en-US', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });

        function App() {
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [dbRefs, setDbRefs] = useState(null);
            
            const [alertModal, setAlertModal] = useState({ isOpen: false, message: '' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

            const showAlert = (message) => setAlertModal({ isOpen: true, message });
            const showConfirm = (message, onConfirm) => setConfirmModal({ isOpen: true, message, onConfirm });

            const [currentView, setCurrentView] = useState('home');
            const [viewHistory, setViewHistory] = useState(['home']);
            const [activeFilter, setActiveFilter] = useState('All');
            const [activeLocationFilter, setActiveLocationFilter] = useState('All'); 
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCart, setSelectedCart] = useState(null);
            const [adminTab, setAdminTab] = useState('carts');
            
            const [semesterConfig, setSemesterConfig] = useState({ startDate: '2026-02-23', totalWeeks: 19, maxAdvanceWeeks: 2 });
            const [tempSemesterConfig, setTempSemesterConfig] = useState({ ...semesterConfig });

            const [selectedWeek, setSelectedWeek] = useState(1);
            const [currentRealWeek, setCurrentRealWeek] = useState(1);
            const [allowSaturday, setAllowSaturday] = useState(false);
            const [hasAutoSetWeek, setHasAutoSetWeek] = useState(false);
            const currentDays = allowSaturday ? [...baseDays, "Saturday"] : baseDays;

            const [cartData, setCartData] = useState({});
            const [usersDB, setUsersDB] = useState({}); 
            const [activityLogs, setActivityLogs] = useState([]); 
            
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [authMode, setAuthMode] = useState('login');
            
            const [adminAddUserModal, setAdminAddUserModal] = useState({ isOpen: false });
            const [addUserForm, setAddUserForm] = useState({ name: '', email: '', classType: '1A', customClass: '', role: 'user' });

            const [bookingModal, setBookingModal] = useState({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false, isPast: false });
            const [bookForm, setBookForm] = useState({ classType: '', customClass: '' });
            const [editBookForm, setEditBookForm] = useState({ name: '', email: '', classType: '', customClass: '' });
            const [editCartModal, setEditCartModal] = useState({ isOpen: false, cartName: null, data: null });
            // 編輯場地時暫存被選為管理員的 email 陣列
            const [editCartManagers, setEditCartManagers] = useState([]);
            const [printSelection, setPrintSelection] = useState([]);

            const [recurringLocks, setRecurringLocks] = useState([]);
            const [lockModal, setLockModal] = useState({ isOpen: false, lockId: null, data: null });

            const [isBatchMode, setIsBatchMode] = useState(false);
            const [batchSelection, setBatchSelection] = useState([]);
            const [myBookingsView, setMyBookingsView] = useState('list');
            const [myBookingsTab, setMyBookingsTab] = useState('upcoming');

            const changeView = (newView) => {
                if (newView === currentView) return;
                setViewHistory(prev => [...prev, newView]);
                setCurrentView(newView);
            };

            const goBack = () => {
                if (viewHistory.length > 1) {
                    const newHistory = [...viewHistory];
                    newHistory.pop();
                    setViewHistory(newHistory);
                    setCurrentView(newHistory[newHistory.length - 1]);
                } else {
                    setCurrentView('home');
                }
            };

            const goHome = () => {
                setViewHistory(['home']);
                setCurrentView('home');
            };

            // 🔧 FIX [安全]: 移除 signInAnonymously，改為僅 Google 登入
        // 原本每個訪客都會建立匿名帳號，導致 Firebase Auth 充滿無用帳號，
        // 且匿名帳號也能通過 rules 的 isAuthenticated() 讀寫資料。
        // 現在改為：頁面載入 → 顯示登入畫面 → Google 登入後才能存取 Firestore。
        // onAuthStateChanged 負責在頁面重新整理時自動恢復 Google session。
        useEffect(() => {
                const initFirebase = async () => {
                    const fb = window.fbModules;
                    const app = fb.initializeApp(firebaseConfig);
                    const auth = fb.getAuth(app);
                    const db = fb.getFirestore(app);

                    const getCol = (colName) => isCanvasEnv
                        ? fb.collection(db, 'artifacts', appId, 'public', 'data', colName)
                        : fb.collection(db, colName);

                    const getDocRef = (colName, docId) => isCanvasEnv
                        ? fb.doc(db, 'artifacts', appId, 'public', 'data', colName, String(docId))
                        : fb.doc(db, colName, String(docId));

                    const refs = { getCol, getDocRef, db, auth, fb };
                    setDbRefs(refs);

                    // Canvas 環境使用 Custom Token
                    if (isCanvasEnv && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            await fb.signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            console.error("Auth Error:", e);
                            setFirebaseReady('auth-error');
                            return;
                        }
                    }

                    // 監聽 Auth 狀態：處理頁面重整時的 session 恢復
                    const ADMIN_EMAIL = 'hanyun@ibsh.tw';
                    fb.onAuthStateChanged(auth, async (user) => {
                        if (user && user.email) {
                            // 已有 Google session，自動恢復登入狀態
                            // 硬編碼的 ADMIN_EMAIL 永遠是超級管理員（即使資料庫沒有此帳號）
                            if (user.email === ADMIN_EMAIL) {
                                setIsAdmin(true);
                                setCurrentUser({ name: 'System Admin', email: ADMIN_EMAIL, defaultClass: 'Admin', customClass: '', role: 'super_admin' });
                            } else {
                                try {
                                    const userDocRef = refs.getDocRef('users', user.email);
                                    const userDoc = await refs.fb.getDoc(userDocRef);
                                    if (userDoc.exists()) {
                                        const udata = userDoc.data();
                                        setCurrentUser(udata);
                                        // role === 'super_admin' 也視為 isAdmin
                                        setIsAdmin(udata.role === 'super_admin');
                                    } else {
                                        // 白名單中沒有此帳號，登出
                                        await fb.signOut(auth);
                                    }
                                } catch (e) {
                                    console.error("Session restore error:", e);
                                }
                            }
                        }
                        // 不管有沒有 session，都設為 ready（讓登入畫面能顯示）
                        setFirebaseReady(true);
                    });
                };

                if (window.fbModules) initFirebase();
                else window.addEventListener('firebaseLoaded', initFirebase);
            }, []);

            // 🔧 FIX [安全]: Cart & Settings 訂閱改為「登入後才啟動」
            // 原本匿名用戶就能觸發 onSnapshot 讀取所有推車資料。
            // 現在加上 currentUser || isAdmin 條件，確保只有通過 Google 登入的用戶才會訂閱。
            useEffect(() => {
                if (!firebaseReady || firebaseReady === 'auth-error' || !dbRefs) return;
                if (!currentUser && !isAdmin) return;

                const unsubCarts = dbRefs.fb.onSnapshot(dbRefs.getCol('carts'), (snap) => {
                    const newCarts = {};
                    snap.forEach(d => { newCarts[d.id] = d.data(); });

                    if (snap.empty && !window.__seededCarts) {
                        window.__seededCarts = true;
                        Object.entries(initialData).forEach(([k, v]) => dbRefs.fb.setDoc(dbRefs.getDocRef('carts', k), v).catch(e => {}));
                    } else {
                        setCartData(newCarts);
                    }
                }, err => console.error("Firestore Error:", err));

                const unsubSettings = dbRefs.fb.onSnapshot(dbRefs.getDocRef('settings', 'main'), (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        if (data.semesterConfig) {
                            setSemesterConfig({ ...data.semesterConfig, maxAdvanceWeeks: data.semesterConfig.maxAdvanceWeeks || 2 });
                            setTempSemesterConfig({ ...data.semesterConfig, maxAdvanceWeeks: data.semesterConfig.maxAdvanceWeeks || 2 });
                        }
                        if (data.allowSaturday !== undefined) setAllowSaturday(data.allowSaturday);
                        setRecurringLocks(Array.isArray(data.recurringLocks) ? data.recurringLocks : []);
                    } else {
                        dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), {
                            semesterConfig: { startDate: '2026-02-23', totalWeeks: 19, maxAdvanceWeeks: 2 },
                            allowSaturday: false
                        }).catch(e => {});
                    }
                }, err => console.error("Firestore Error:", err));

                return () => { unsubCarts(); unsubSettings(); };
            }, [firebaseReady, dbRefs, currentUser, isAdmin]);

            // Users 訂閱：所有已登入使用者都訂閱
            // 場地管理員、一般使用者也需要 users 資料，才能顯示「審核者姓名」、寄信時帶上申請人姓名等。
            // 安全性：請在 Firestore Rules 限制只有登入者能讀，且 role 欄位只有 super_admin 可寫。
            useEffect(() => {
                if (!dbRefs || (!currentUser && !isAdmin)) return;

                const unsubUsers = dbRefs.fb.onSnapshot(dbRefs.getCol('users'), (snap) => {
                    const newUsers = {};
                    snap.forEach(d => { newUsers[d.id] = d.data(); });

                    if (snap.empty && !window.__seededUsers && isAdmin) {
                        window.__seededUsers = true;
                        Object.entries(initialUsers).forEach(([k, v]) => dbRefs.fb.setDoc(dbRefs.getDocRef('users', k), v).catch(e => {}));
                    } else {
                        setUsersDB(newUsers);
                    }
                });

                return () => { unsubUsers(); };
            }, [dbRefs, isAdmin, currentUser]);

            // 🔧 FIX [效能]: Logs 改為「懶載入」— 只在管理員切到 logs tab 時才訂閱
            // 原本管理員一登入就 onSnapshot 訂閱 100 筆 logs（即使在看其他 tab），
            // 每次有人操作都會觸發 snapshot，導致 Firestore 讀取次數飆高。
            // 現在只在 adminTab === 'logs' 時才啟動即時訂閱，離開 tab 自動取消訂閱。
            useEffect(() => {
                if (!dbRefs || !isAdmin || adminTab !== 'logs') {
                    return;
                }

                const logsQuery = dbRefs.fb.query(
                    dbRefs.getCol('logs'),
                    dbRefs.fb.orderBy('createdAt', 'desc'),
                    dbRefs.fb.limit(100)
                );
                const unsubLogs = dbRefs.fb.onSnapshot(logsQuery, (snap) => {
                    let newLogs = [];
                    snap.forEach(d => { newLogs.push({ id: d.id, ...d.data() }); });
                    setActivityLogs(newLogs);
                });

                return () => { unsubLogs(); };
            }, [dbRefs, isAdmin, adminTab]);

            useEffect(() => {
                if (firebaseReady && firebaseReady !== 'auth-error') {
                    const now = new Date();
                    const [year, month, day] = semesterConfig.startDate.split('-').map(Number);
                    const start = new Date(year, month - 1, day);
                    start.setHours(0, 0, 0, 0);
                    now.setHours(0, 0, 0, 0);
                    
                    const diffTime = now.getTime() - start.getTime();
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    let currentWeekCalc = Math.floor(diffDays / 7) + 1;
                    
                    if (currentWeekCalc < 1) currentWeekCalc = 1;
                    if (currentWeekCalc > semesterConfig.totalWeeks) currentWeekCalc = semesterConfig.totalWeeks;
                    
                    setCurrentRealWeek(currentWeekCalc);

                    if (!hasAutoSetWeek) {
                        setSelectedWeek(currentWeekCalc);
                        setHasAutoSetWeek(true); 
                    }
                }
            }, [firebaseReady, semesterConfig, hasAutoSetWeek]);

            useEffect(() => {
                if (selectedWeek > semesterConfig.totalWeeks) setSelectedWeek(semesterConfig.totalWeeks);
                setBatchSelection([]);
            }, [selectedWeek, semesterConfig.totalWeeks]);

            // =================================================================
            // 🔧 FIX [效能]: 用 useMemo 快取計算結果
            // 原本每次 render（包含與預約無關的 UI 操作如開關 modal）都重新跑
            // 排序/過濾/我的預約計算。現在只在依賴資料真正變更時才重算。
            // =================================================================
            const sortedAllCarts = useMemo(() =>
                Object.entries(cartData).sort((a, b) => (a[1].order || 0) - (b[1].order || 0)),
                [cartData]
            );

            const filteredCarts = useMemo(() =>
                sortedAllCarts
                    .filter(([name, data]) => activeFilter === 'All' || data.type === activeFilter)
                    .filter(([name, data]) => activeLocationFilter === 'All' || data.location === activeLocationFilter)
                    .filter(([name, data]) => name.toLowerCase().includes(searchQuery.toLowerCase()) || (data.notes && data.notes.toLowerCase().includes(searchQuery.toLowerCase()))),
                [sortedAllCarts, activeFilter, activeLocationFilter, searchQuery]
            );

            const locations = useMemo(() =>
                ['All', ...Array.from(new Set(Object.values(cartData).map(c => c.location).filter(Boolean)))],
                [cartData]
            );

            const weeksArray = useMemo(() =>
                Array.from({ length: semesterConfig.totalWeeks }, (_, i) => i + 1),
                [semesterConfig.totalWeeks]
            );
            
            const moveCart = async (cartName, direction) => {
                const sortedNames = sortedAllCarts.map(arr => arr[0]);
                const idx = sortedNames.indexOf(cartName);
                if (direction === 'up' && idx > 0) [sortedNames[idx - 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx - 1]];
                else if (direction === 'down' && idx < sortedNames.length - 1) [sortedNames[idx + 1], sortedNames[idx]] = [sortedNames[idx], sortedNames[idx + 1]];
                else return;
                
                try {
                    const batch = dbRefs.fb.writeBatch(dbRefs.db);
                    let hasChanges = false;
                    for (let i = 0; i < sortedNames.length; i++) {
                        const cName = sortedNames[i];
                        if ((cartData[cName].order || 0) !== i) {
                            batch.update(dbRefs.getDocRef('carts', cName), { order: i });
                            hasChanges = true;
                        }
                    }
                    if (hasChanges) await batch.commit();
                } catch (e) {
                    console.error("Move error:", e);
                    showAlert("Failed to reorder carts.");
                }
            };

            const getIcon = (type) => {
                if (type === '綜合場地') return <div className="w-12 h-12 bg-duo-blue/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-basketball text-duo-blue text-2xl"></i></div>;
                if (type === '重訓室') return <div className="w-12 h-12 bg-duo-red/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-dumbbell text-duo-red text-2xl"></i></div>;
                if (type === '多功能訓練室') return <div className="w-12 h-12 bg-duo-green/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-person-running text-duo-green text-2xl"></i></div>;
                return <div className="w-12 h-12 bg-duo-yellow/10 rounded-2xl flex items-center justify-center shrink-0"><i className="fa-solid fa-location-dot text-duo-yellow text-2xl"></i></div>;
            };

            const addLog = async (action, cart, details, specificUser = null) => {
                const operator = isAdmin ? 'Admin' : (currentUser ? currentUser.name : 'Unknown');
                const id = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}`;
                const newLog = { 
                    time: getTimestamp(), 
                    operator: specificUser || operator, 
                    action, 
                    cart, 
                    details,
                    createdAt: dbRefs.fb.serverTimestamp() 
                };
                if(dbRefs) await dbRefs.fb.setDoc(dbRefs.getDocRef('logs', id), newLog);
            };

            const getWeekDateRange = (weekNum, includeSat) => {
                const start = new Date(semesterConfig.startDate);
                if (isNaN(start.getTime())) return "Invalid Date";
                start.setDate(start.getDate() + (weekNum - 1) * 7);
                const end = new Date(start);
                end.setDate(end.getDate() + (includeSat ? 5 : 4)); 
                return `${start.getMonth() + 1}/${start.getDate()} - ${end.getMonth() + 1}/${end.getDate()}`;
            };

            const getDateForDayIdx = (weekNum, dayIdx) => {
                if (!semesterConfig.startDate) return "";
                const [year, month, day] = semesterConfig.startDate.split('-').map(Number);
                const date = new Date(year, month - 1, day);
                if (isNaN(date.getTime())) return "";
                date.setDate(date.getDate() + (weekNum - 1) * 7 + dayIdx);
                return `${date.getMonth() + 1}/${date.getDate()}`;
            };

            const handleSaturdayToggle = async (e) => {
                const newVal = e.target.checked;
                setAllowSaturday(newVal); 
                if (dbRefs) {
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { allowSaturday: newVal }, { merge: true });
                    addLog(newVal ? "Enable Saturday" : "Disable Saturday", "System", "Admin toggled Saturday booking setting");
                }
            };

            // 🔧 FIX [安全]: Google 登入流程
            // signInWithPopup 成功後，onAuthStateChanged 會自動觸發 session 恢復。
            // 這裡只需要處理 Canvas 環境模擬登入和登入失敗的情況。
            const handleGoogleLogin = async () => {
                const ADMIN_EMAIL = 'ptaopenhour@ibsh.tw';

                if (isCanvasEnv) {
                    const testEmail = prompt(`【預覽環境模擬登入】\n\n請輸入你想模擬驗證的信箱:\n(最高權限管理員請輸入 ${ADMIN_EMAIL})`, ADMIN_EMAIL);
                    if (!testEmail) return;

                    if (testEmail.trim() === ADMIN_EMAIL) {
                        setIsAdmin(true);
                        setCurrentUser({ name: 'System Admin', email: ADMIN_EMAIL, defaultClass: 'Admin', customClass: '', role: 'super_admin' });
                        goHome();
                        return;
                    }

                    const userDocRef = dbRefs.getDocRef('users', testEmail.trim());
                    const userDoc = await dbRefs.fb.getDoc(userDocRef);
                    if (userDoc.exists()) {
                        const udata = userDoc.data();
                        setCurrentUser(udata);
                        setIsAdmin(udata.role === 'super_admin');
                        goHome();
                    } else {
                        showAlert(`Access Denied.\nYour account (${testEmail}) is not in the allowed whitelist.`);
                    }
                    return;
                }

                try {
                    const provider = new dbRefs.fb.GoogleAuthProvider();
                    const result = await dbRefs.fb.signInWithPopup(dbRefs.auth, provider);
                    const userEmail = result.user.email;

                    // onAuthStateChanged 會自動處理 session 恢復，
                    // 但如果白名單中沒有此帳號，需要立即登出並顯示錯誤。
                    if (userEmail !== ADMIN_EMAIL) {
                        const userDocRef = dbRefs.getDocRef('users', userEmail);
                        const userDoc = await dbRefs.fb.getDoc(userDocRef);
                        if (!userDoc.exists()) {
                            await dbRefs.fb.signOut(dbRefs.auth);
                            setCurrentUser(null);
                            setIsAdmin(false);
                            showAlert(`Access Denied.\nYour email (${userEmail}) is not registered in the whitelist.\nPlease contact the administrator.`);
                        }
                    }
                    // 如果驗證通過，onAuthStateChanged 已經設好 currentUser & isAdmin
                } catch (error) {
                    console.error(error);
                    if (error.code !== 'auth/popup-closed-by-user') {
                        showAlert(`Google Login Failed: ${error.message}`);
                    }
                }
            };

            const handleAdminAddUser = async (e) => {
                e.preventDefault();
                const email = addUserForm.email.trim();
                try {
                    const existingDoc = await dbRefs.fb.getDoc(dbRefs.getDocRef('users', email));
                    if (existingDoc.exists()) {
                        return showAlert("此 Email 已存在白名單中！");
                    }
                    const newUser = {
                        name: addUserForm.name.trim(), 
                        email: email, 
                        defaultClass: addUserForm.classType, 
                        customClass: addUserForm.customClass,
                        role: addUserForm.role || 'user'
                    };
                    await dbRefs.fb.setDoc(dbRefs.getDocRef('users', email), newUser);
                    addLog("Add User", "System", `新增使用者：${email}（${ROLE_LABEL[newUser.role] || newUser.role}）`);
                    showAlert("使用者已加入白名單！");
                    setAddUserForm({ name: '', email: '', classType: '1A', customClass: '', role: 'user' });
                    setAdminAddUserModal({ isOpen: false });
                } catch(err) {
                    console.error(err);
                    showAlert("新增失敗，請稍後再試。");
                }
            };

            // 編輯既有使用者的角色
            const handleUpdateUserRole = async (email, newRole) => {
                try {
                    await dbRefs.fb.updateDoc(dbRefs.getDocRef('users', email), { role: newRole });
                    addLog("Update Role", "System", `${email} → ${ROLE_LABEL[newRole] || newRole}`);
                } catch (err) {
                    console.error(err);
                    showAlert("更新角色失敗，請稍後再試。");
                }
            };

            const handleSemesterConfigSave = async (e) => {
                e.preventDefault();
                await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { semesterConfig: tempSemesterConfig }, { merge: true });
                addLog("Update Config", "System", `Start Date: ${tempSemesterConfig.startDate}, Total Weeks: ${tempSemesterConfig.totalWeeks}, Advance: ${tempSemesterConfig.maxAdvanceWeeks}W`);
                showAlert("Semester configuration updated successfully!");
            };

            const handleClearSemesterData = () => {
                showConfirm("⚠️ WARNING: Are you sure you want to clear ALL booking records?\n\nThis action cannot be undone!", async () => {
                    try {
                        const batch = dbRefs.fb.writeBatch(dbRefs.db);
                        for (const cartName of Object.keys(cartData)) {
                            batch.update(dbRefs.getDocRef('carts', cartName), { schedule: {} });
                        }
                        await batch.commit();
                        
                        setSelectedWeek(1);
                        addLog("Clear Data", "System", "Admin cleared all booking records (New Semester)");
                        showAlert("All booking data has been cleared!");
                    } catch (error) {
                        console.error("Batch clear error:", error);
                        showAlert("Failed to clear all data due to a network error. Please try again.");
                    }
                });
            };

            const getLockForSlot = (cartName, week, dayIdx, periodId) => {
                if (periodId === 'lunch') return null;
                return recurringLocks.find(lock =>
                    lock.cartName === cartName &&
                    Number(lock.dayIdx) === Number(dayIdx) &&
                    String(lock.periodId) === String(periodId) &&
                    week >= Number(lock.startWeek) &&
                    week < Number(lock.startWeek) + Number(lock.weeks)
                ) || null;
            };

            const saveLock = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const lockData = {
                    id: lockModal.lockId || `lock_${Date.now()}_${Math.random().toString(36).substring(2, 7)}`,
                    name: formData.get('name').trim() || 'Locked',
                    cartName: formData.get('cartName'),
                    dayIdx: Number(formData.get('dayIdx')),
                    periodId: formData.get('periodId'),
                    startWeek: Number(formData.get('startWeek')),
                    weeks: Number(formData.get('weeks'))
                };

                if (!lockData.cartName) { showAlert("請選擇一個 Cart。"); return; }
                if (lockData.weeks < 1) { showAlert("持續週數必須至少 1 週。"); return; }

                try {
                    const newLocks = lockModal.lockId
                        ? recurringLocks.map(l => l.id === lockModal.lockId ? lockData : l)
                        : [...recurringLocks, lockData];

                    await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { recurringLocks: newLocks }, { merge: true });

                    const cartRef = dbRefs.getDocRef('carts', lockData.cartName);
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) return;
                        const schedule = cartDoc.data().schedule || {};
                        let changed = false;
                        for (let w = lockData.startWeek; w < lockData.startWeek + lockData.weeks; w++) {
                            const slotId = `w${w}_d${lockData.dayIdx}_p${lockData.periodId}`;
                            if (schedule[slotId]) { delete schedule[slotId]; changed = true; }
                        }
                        if (changed) transaction.update(cartRef, { schedule });
                    });

                    addLog(lockModal.lockId ? "Edit Lock" : "Add Lock", lockData.cartName, `${lockData.name} · Wk${lockData.startWeek}-${lockData.startWeek + lockData.weeks - 1} · ${currentDays[lockData.dayIdx] || `Day${lockData.dayIdx}`} P${lockData.periodId}`);
                    setLockModal({ isOpen: false, lockId: null, data: null });
                } catch (err) {
                    console.error("Save lock error:", err);
                    showAlert("儲存鎖定失敗，請稍後再試。");
                }
            };

            const deleteLock = (lockId) => {
                const lock = recurringLocks.find(l => l.id === lockId);
                if (!lock) return;
                showConfirm(`確定要刪除鎖定「${lock.name}」嗎？`, async () => {
                    try {
                        const newLocks = recurringLocks.filter(l => l.id !== lockId);
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('settings', 'main'), { recurringLocks: newLocks }, { merge: true });
                        addLog("Delete Lock", lock.cartName, `${lock.name} · Wk${lock.startWeek}-${lock.startWeek + lock.weeks - 1}`);
                    } catch (err) {
                        console.error("Delete lock error:", err);
                        showAlert("刪除鎖定失敗，請稍後再試。");
                    }
                });
            };

            const deleteUser = (email) => {
                showConfirm(`Delete user ${usersDB[email].name} from whitelist?\nThey will no longer be able to log in.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('users', email));
                    addLog("Delete User", "System", `Admin removed account from whitelist: ${email}`);
                });
            };

            const todayDay = new Date().getDay();
            const currentRealDayIdx = todayDay === 0 ? 6 : todayDay - 1;

            // 🔧 通用 GAS Web App 呼叫函式
            // 所有寄信功能都走這個。失敗時只在 console 顯示錯誤，不阻擋使用者操作。
            //
            // ⚠️ GAS Web App 的 fetch 必須用 'text/plain' Content-Type 才能跳過 CORS preflight。
            // GAS 端會自己 parse JSON。
            const callGAS = useCallback(async (action, extraData) => {
                if (GAS_CONFIG.WEB_APP_URL === 'YOUR_WEB_APP_URL') {
                    console.warn("Google Apps Script not configured. Skipping action:", action);
                    return null;
                }
                const payload = {
                    secret: GAS_CONFIG.API_SECRET,
                    action,
                    ...extraData
                };
                try {
                    const res = await fetch(GAS_CONFIG.WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload),
                        redirect: 'follow'
                    });
                    const result = await res.json();
                    if (!result.ok) console.error(`GAS [${action}] error:`, result.error);
                    return result;
                } catch (err) {
                    console.error(`GAS [${action}] fetch failed:`, err);
                    return null;
                }
            }, []);

            // 寄送審核通知信給場地管理員（一個或多個）
            const sendApprovalEmail = async ({ managerEmails, cartName, applicantName, applicantEmail, className, week, dayName, periodName, slotCount, slotDate }) => {
                const emails = (managerEmails || []).filter(Boolean);
                if (emails.length === 0) return;
                const approveLink = window.location.origin + window.location.pathname;
                await callGAS('sendApprovalNotification', {
                    managerEmails: emails,
                    cartName, applicantName, applicantEmail, className,
                    week, dayName, periodName,
                    slotDate: slotDate || '',
                    slotCount: slotCount || 1,
                    approveLink
                });
            };

            // 寄送審核結果信
            // 收件者規則：申請人 + 該場地的所有管理員（除了實際審核的那位）
            const sendReviewResultEmail = async ({ decision, applicantEmail, applicantName, otherManagerEmails, reviewerName, reviewerEmail, cartName, className, week, dayName, periodName, slotDate }) => {
                const cleanOthers = (otherManagerEmails || []).filter(e => e && e.toLowerCase() !== (reviewerEmail || '').toLowerCase());
                await callGAS('sendReviewResult', {
                    decision, // 'approved' | 'rejected'
                    applicantEmail,
                    applicantName,
                    otherManagerEmails: cleanOthers,
                    reviewerName: reviewerName || '系統管理員',
                    reviewerEmail: reviewerEmail || '',
                    cartName, className, week, dayName, periodName,
                    slotDate: slotDate || ''
                });
            };

            const handleSlotClick = (dayIdx, periodId, existingBooking) => {
                if (periodId === 'lunch') return;

                const lock = getLockForSlot(selectedCart, selectedWeek, dayIdx, periodId);
                if (lock) {
                    showAlert(`🔒 此時段已被鎖定\n\n名稱：${lock.name}\n期間：第 ${lock.startWeek} - ${lock.startWeek + lock.weeks - 1} 週`);
                    return;
                }

                const isPastSlot = selectedWeek < currentRealWeek || (selectedWeek === currentRealWeek && dayIdx < currentRealDayIdx);

                const isPastLimit = !isAdmin && (selectedWeek > currentRealWeek + (semesterConfig.maxAdvanceWeeks || 2));
                if (isPastLimit) {
                    showAlert(`⚠️ Booking Limit Exceeded\n\nTo ensure fairness, the system only allows bookings up to ${semesterConfig.maxAdvanceWeeks || 2} week(s) in advance.\nPlease try again closer to your desired date!`);
                    return;
                }

                if (existingBooking) {
                    setBookingModal({ isOpen: true, dayIdx, periodId, existingBooking, isEditing: false, isBatch: false, isPast: isPastSlot });
                } else {
                    if (isPastSlot && !isAdmin) {
                        showAlert("⚠️ Cannot book slots in the past!");
                        return;
                    }

                    if (isBatchMode) {
                        const slotId = `w${selectedWeek}_d${dayIdx}_p${periodId}`;
                        setBatchSelection(prev => 
                            prev.some(s => s.slotId === slotId) 
                                ? prev.filter(s => s.slotId !== slotId) 
                                : [...prev, { dayIdx, periodId, slotId }]
                        );
                    } else {
                        setBookForm({ classType: currentUser.defaultClass, customClass: currentUser.customClass });
                        setBookingModal({ isOpen: true, dayIdx, periodId, existingBooking: null, isEditing: false, isBatch: false, isPast: false });
                    }
                }
            };

            const executeBookingTransaction = async (slotsToBook, finalClass) => {
                const cartRef = dbRefs.getDocRef('carts', selectedCart);

                // 預約是否需要審核：只要該場地有設定任何管理員就需要審核
                const cartInfo = cartData[selectedCart] || {};
                const managerEmails = (Array.isArray(cartInfo.managerEmails) ? cartInfo.managerEmails : []).filter(Boolean);
                // 超級管理員自己預約不需要審核；其他使用者只要場地有管理員就需要審核
                const needsApproval = managerEmails.length > 0 && !isAdmin;
                const initialStatus = needsApproval ? 'pending' : 'approved';

                try {
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";

                        const currentData = cartDoc.data();
                        const currentSchedule = currentData.schedule || {};

                        for (const slot of slotsToBook) {
                            if (getLockForSlot(selectedCart, selectedWeek, slot.dayIdx, slot.periodId)) {
                                throw "SLOT_LOCKED";
                            }
                            if (currentSchedule[slot.slotId]) {
                                throw "SLOT_ALREADY_TAKEN";
                            }
                            currentSchedule[slot.slotId] = {
                                name: currentUser.name, email: currentUser.email, 
                                className: finalClass, ownerEmail: currentUser.email,
                                status: initialStatus,
                                createdAt: Date.now()
                            };
                        }
                        transaction.update(cartRef, { schedule: currentSchedule });
                    });

                    const details = slotsToBook.length === 1 
                        ? `Week ${selectedWeek} ${currentDays[slotsToBook[0].dayIdx]} P${slotsToBook[0].periodId} (${finalClass}) [${initialStatus}]`
                        : `Batch booked ${slotsToBook.length} slots for Week ${selectedWeek} (${finalClass}) [${initialStatus}]`;
                    
                    addLog("Add Booking", selectedCart, details);
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                    setBatchSelection([]);
                    setIsBatchMode(false);

                    // 🔧 寄信通知所有管理員（只在 pending 時寄）
                    if (needsApproval) {
                        const firstSlot = slotsToBook[0];
                        const periodInfo = periods.find(p => String(p.id) === String(firstSlot.periodId));
                        sendApprovalEmail({
                            managerEmails,
                            cartName: selectedCart,
                            applicantName: currentUser.name,
                            applicantEmail: currentUser.email,
                            className: finalClass,
                            week: selectedWeek,
                            dayName: currentDays[firstSlot.dayIdx],
                            periodName: periodInfo ? periodInfo.name : `Period ${firstSlot.periodId}`,
                            slotDate: getDateForDayIdx(selectedWeek, firstSlot.dayIdx),
                            slotCount: slotsToBook.length
                        });
                        showAlert(`✅ 預約已送出！\n\n您的申請正在等待場地管理員審核。\n審核結果將反映在「My Bookings」頁面。`);
                    }
                    
                } catch (error) {
                    if (error === "SLOT_ALREADY_TAKEN") showAlert("慢了一步！你選的時段中，有部分已被別人搶走囉，請重新選擇。");
                    else if (error === "SLOT_LOCKED") showAlert("🔒 你選的時段中包含已被鎖定的格子，無法預約。");
                    else if (error === "CART_NOT_FOUND") showAlert("找不到該設備，可能已被管理員刪除。");
                    else showAlert("預約發生錯誤，請稍後檢查網路連線再試。");
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                }
            };

            const checkConflictsAndSubmit = async () => {
                const finalClass = bookForm.classType === 'Other (Specify)' ? bookForm.customClass : bookForm.classType;
                const slotsToBook = bookingModal.isBatch ? batchSelection : [{ dayIdx: bookingModal.dayIdx, periodId: bookingModal.periodId, slotId: `w${selectedWeek}_d${bookingModal.dayIdx}_p${bookingModal.periodId}` }];
                
                const conflictingSlots = slotsToBook.filter(slot => {
                    return Object.entries(cartData).some(([cName, cData]) => {
                        return cName !== selectedCart && cData.schedule && cData.schedule[slot.slotId]?.className === finalClass;
                    });
                });

                if (conflictingSlots.length > 0) {
                    showConfirm(`[Duplicate Booking Warning]\nClass "${finalClass}" has already reserved other equipment during this time slot.\nAre you sure you want to proceed with this additional booking?`, () => {
                        executeBookingTransaction(slotsToBook, finalClass);
                    });
                } else {
                    executeBookingTransaction(slotsToBook, finalClass);
                }
            };

            // 🔧 審核：通過 / 退回
            // 管理員（系統管理員 或 該場地的 managerEmails 中任一人）才能執行
            const canApproveCart = useCallback((cartName) => {
                if (isAdmin) return true;
                const info = cartData[cartName];
                if (!info || !currentUser) return false;
                const list = Array.isArray(info.managerEmails) ? info.managerEmails : [];
                const myEmail = (currentUser.email || '').trim().toLowerCase();
                return list.some(e => (e || '').trim().toLowerCase() === myEmail);
            }, [isAdmin, cartData, currentUser]);

            const reviewBooking = async (cartName, slotId, decision) => {
                // decision: 'approved' | 'rejected'
                if (!canApproveCart(cartName)) {
                    showAlert("你沒有審核此場地的權限。");
                    return;
                }
                const cartRef = dbRefs.getDocRef('carts', cartName);
                try {
                    let bookingDetail = null;
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";
                        const schedule = cartDoc.data().schedule || {};
                        if (!schedule[slotId]) throw "SLOT_NOT_FOUND";
                        bookingDetail = { ...schedule[slotId] };

                        if (decision === 'approved') {
                            schedule[slotId] = { ...schedule[slotId], status: 'approved', reviewedAt: Date.now(), reviewedBy: currentUser.email };
                            transaction.update(cartRef, { schedule });
                        } else {
                            // 退回直接刪除
                            delete schedule[slotId];
                            transaction.update(cartRef, { schedule });
                        }
                    });

                    const match = slotId.match(/w(\d+)_d(\d+)_p(\w+)/);
                    const detailStr = match ? `W${match[1]} ${currentDays[parseInt(match[2])]} P${match[3]} (${bookingDetail?.name})` : slotId;
                    addLog(decision === 'approved' ? "Approve Booking" : "Reject Booking", cartName, detailStr);

                    // 🔧 寄結果信：申請人 + 該場地其他管理員（排除自己）
                    if (bookingDetail && match) {
                        const cartInfo = cartData[cartName] || {};
                        const allManagers = Array.isArray(cartInfo.managerEmails) ? cartInfo.managerEmails : [];
                        const week = parseInt(match[1]);
                        const dayIdx = parseInt(match[2]);
                        const periodId = match[3];
                        const periodInfo = periods.find(p => String(p.id) === String(periodId));
                        sendReviewResultEmail({
                            decision,
                            applicantEmail: bookingDetail.ownerEmail || bookingDetail.email,
                            applicantName: bookingDetail.name,
                            otherManagerEmails: allManagers,
                            reviewerName: currentUser.name,
                            reviewerEmail: currentUser.email,
                            cartName,
                            className: bookingDetail.className,
                            week,
                            dayName: currentDays[dayIdx],
                            periodName: periodInfo ? periodInfo.name : `Period ${periodId}`,
                            slotDate: getDateForDayIdx(week, dayIdx)
                        });
                    }

                    showAlert(decision === 'approved' ? "✅ 已核准此預約，結果已寄信通知申請人。" : "❎ 已退回此預約，結果已寄信通知申請人。");
                } catch (err) {
                    if (err === "SLOT_NOT_FOUND") showAlert("這筆預約已不存在，可能已被取消。");
                    else if (err === "CART_NOT_FOUND") showAlert("找不到該場地。");
                    else { console.error(err); showAlert("審核失敗，請稍後再試。"); }
                }
            };

            // 計算「等待我審核」的清單（給管理者用）
            const pendingForMe = useMemo(() => {
                if (!currentUser && !isAdmin) return [];
                const result = [];
                Object.entries(cartData).forEach(([cartName, data]) => {
                    if (!canApproveCart(cartName)) return;
                    const sch = data.schedule || {};
                    Object.entries(sch).forEach(([slotId, info]) => {
                        if (info.status === 'pending') {
                            const m = slotId.match(/w(\d+)_d(\d+)_p(\w+)/);
                            if (m) {
                                result.push({
                                    cartName, slotId, info,
                                    week: parseInt(m[1]), dayIdx: parseInt(m[2]), periodId: m[3]
                                });
                            }
                        }
                    });
                });
                result.sort((a, b) => {
                    if (a.week !== b.week) return a.week - b.week;
                    if (a.dayIdx !== b.dayIdx) return a.dayIdx - b.dayIdx;
                    return periods.findIndex(p => p.id == a.periodId) - periods.findIndex(p => p.id == b.periodId);
                });
                return result;
            }, [cartData, currentUser, isAdmin, canApproveCart]);


            // 原本用 updateDoc + deleteField，如果 Admin 同時在編輯同一筆預約，
            // 可能產生 Race Condition。改用 Transaction 確保讀寫原子性，並在預約
            // 已被取消時給予明確的錯誤訊息而不是靜默失敗。
            // =================================================================
            const cancelBooking = async () => {
                const slotId = `w${selectedWeek}_d${bookingModal.dayIdx}_p${bookingModal.periodId}`;
                const cartRef = dbRefs.getDocRef('carts', selectedCart);
                
                try {
                    let cancelledName = '';
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";
                        
                        const currentSchedule = cartDoc.data().schedule || {};
                        if (!currentSchedule[slotId]) throw "ALREADY_CANCELLED";
                        
                        // 非管理員只能取消自己的預約
                        if (!isAdmin && currentSchedule[slotId].ownerEmail !== currentUser.email) {
                            throw "NOT_OWNER";
                        }
                        
                        cancelledName = currentSchedule[slotId].name;
                        delete currentSchedule[slotId];
                        transaction.update(cartRef, { schedule: currentSchedule });
                    });

                    const actionName = isAdmin ? "Force Cancel" : "Cancel Booking";
                    addLog(actionName, selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId} (${cancelledName})`);
                } catch (error) {
                    if (error === "ALREADY_CANCELLED") showAlert("這筆預約已經被取消了。");
                    else if (error === "NOT_OWNER") showAlert("你只能取消自己的預約。");
                    else if (error === "CART_NOT_FOUND") showAlert("找不到該設備。");
                    else showAlert("取消失敗，請稍後再試。");
                }
                
                setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
            };

            const handleEditClick = () => {
                const existing = bookingModal.existingBooking;
                const isStandardClass = classOptions.includes(existing.className);
                setEditBookForm({
                    name: existing.name, email: existing.email,
                    classType: isStandardClass ? existing.className : 'Other (Specify)',
                    customClass: isStandardClass ? '' : existing.className
                });
                setBookingModal(prev => ({ ...prev, isEditing: true }));
            };

            const updateBooking = async () => {
                const slotId = `w${selectedWeek}_d${bookingModal.dayIdx}_p${bookingModal.periodId}`;
                const finalClass = editBookForm.classType === 'Other (Specify)' ? editBookForm.customClass : editBookForm.classType;
                const cartRef = dbRefs.getDocRef('carts', selectedCart);
                
                try {
                    await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                        const cartDoc = await transaction.get(cartRef);
                        if (!cartDoc.exists()) throw "CART_NOT_FOUND";

                        const currentData = cartDoc.data();
                        const currentSchedule = currentData.schedule || {};

                        if (!currentSchedule[slotId]) {
                            throw "SLOT_NOT_FOUND"; 
                        }
                        
                        currentSchedule[slotId] = { 
                            ...currentSchedule[slotId],
                            name: editBookForm.name, 
                            email: editBookForm.email, 
                            className: finalClass, 
                            ownerEmail: editBookForm.email 
                        };
                        
                        transaction.update(cartRef, { schedule: currentSchedule });
                    });

                    addLog("Admin Edit", selectedCart, `Week ${selectedWeek} ${currentDays[bookingModal.dayIdx]} P${bookingModal.periodId} (Updated: ${editBookForm.name})`);
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                } catch (error) {
                    if (error === "SLOT_NOT_FOUND") showAlert("這筆預約似乎已經被使用者手動取消了！請重新確認設備狀態。");
                    else if (error === "CART_NOT_FOUND") showAlert("找不到該設備。");
                    else showAlert("更新失敗，請稍後再試。");
                    setBookingModal({ isOpen: false, dayIdx: null, periodId: null, existingBooking: null, isEditing: false, isBatch: false });
                }
            };

            const saveCartEdit = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const oldName = editCartModal.cartName;
                const newName = formData.get('name').trim();
                const managerEmails = (editCartManagers || []).filter(Boolean);

                try {
                    if (oldName && oldName === newName) {
                        await dbRefs.fb.updateDoc(dbRefs.getDocRef('carts', newName), {
                            type: formData.get('type'), 
                            location: formData.get('location'), 
                            capacity: parseInt(formData.get('capacity')), 
                            notes: formData.get('notes'),
                            managerEmails
                        });
                    } else if (oldName && oldName !== newName) {
                        await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                            const oldDocRef = dbRefs.getDocRef('carts', oldName);
                            const newDocRef = dbRefs.getDocRef('carts', newName);
                            const oldDoc = await transaction.get(oldDocRef);
                            
                            if (!oldDoc.exists()) throw "CART_NOT_FOUND";
                            
                            const latestData = oldDoc.data();
                            const newData = {
                                ...latestData,
                                type: formData.get('type'), 
                                location: formData.get('location'), 
                                capacity: parseInt(formData.get('capacity')), 
                                notes: formData.get('notes'),
                                managerEmails
                            };
                            
                            transaction.set(newDocRef, newData);
                            transaction.delete(oldDocRef);
                        });
                    } else {
                        const newData = {
                            type: formData.get('type'), location: formData.get('location'), capacity: parseInt(formData.get('capacity')), notes: formData.get('notes'),
                            managerEmails,
                            schedule: {},
                            order: Object.keys(cartData).length
                        };
                        await dbRefs.fb.setDoc(dbRefs.getDocRef('carts', newName), newData);
                    }
                    
                    addLog(oldName ? "Edit Equipment" : "Add Equipment", "System", `Equipment: ${newName}（管理員：${managerEmails.length} 人）`);
                    setEditCartModal({ isOpen: false, cartName: null, data: null });
                    setEditCartManagers([]);
                } catch (err) {
                    console.error("Save cart error:", err);
                    if (err === "CART_NOT_FOUND") showAlert("The cart you are trying to edit was not found or was deleted.");
                    else showAlert("Failed to save equipment. Please try again.");
                }
            };

            const deleteCart = (name) => {
                showConfirm(`Delete "${name}"?\nThis clears all its bookings.`, async () => {
                    await dbRefs.fb.deleteDoc(dbRefs.getDocRef('carts', name));
                    addLog("Delete Equipment", "System", `Equipment: ${name}`);
                    if (selectedCart === name) setSelectedCart(null);
                });
            };

            // =================================================================
            // 🔧 FIX [效能]: getMyBookings 改用 useMemo 快取
            // 原本每次 render 都重新遍歷所有 cart 的所有 schedule entries。
            // 現在只在 cartData 或 currentUser 變更時才重算。
            // =================================================================
            const allMyBookings = useMemo(() => {
                const myBookings = [];
                if (!currentUser) return myBookings;
                
                Object.entries(cartData).forEach(([cartName, data]) => {
                    if (data.schedule) {
                        Object.entries(data.schedule).forEach(([slotId, bookingInfo]) => {
                            if (bookingInfo.ownerEmail === currentUser.email) {
                                const match = slotId.match(/w(\d+)_d(\d+)_p(\w+)/);
                                if (match) {
                                    myBookings.push({ cartName, week: parseInt(match[1]), dayIdx: parseInt(match[2]), periodId: match[3], slotId, className: bookingInfo.className });
                                }
                            }
                        });
                    }
                });

                myBookings.sort((a, b) => {
                    if (a.week !== b.week) return a.week - b.week;
                    if (a.dayIdx !== b.dayIdx) return a.dayIdx - b.dayIdx;
                    return periods.findIndex(p => p.id == a.periodId) - periods.findIndex(p => p.id == b.periodId);
                });
                return myBookings;
            }, [cartData, currentUser]);

            // 🔧 FIX [衝突]: cancelBookingFromList 也改用 runTransaction
            const cancelBookingFromList = (cartName, slotId, className) => {
                showConfirm(`Are you sure you want to cancel this booking for ${cartName}?`, async () => {
                    const cartRef = dbRefs.getDocRef('carts', cartName);
                    
                    try {
                        await dbRefs.fb.runTransaction(dbRefs.db, async (transaction) => {
                            const cartDoc = await transaction.get(cartRef);
                            if (!cartDoc.exists()) throw "CART_NOT_FOUND";
                            
                            const currentSchedule = cartDoc.data().schedule || {};
                            if (!currentSchedule[slotId]) throw "ALREADY_CANCELLED";
                            
                            if (!isAdmin && currentSchedule[slotId].ownerEmail !== currentUser.email) {
                                throw "NOT_OWNER";
                            }
                            
                            delete currentSchedule[slotId];
                            transaction.update(cartRef, { schedule: currentSchedule });
                        });
                        
                        const match = slotId.match(/w(\d+)_d(\d+)_p(\w+)/);
                        if (match) addLog("Cancel Booking", cartName, `W${match[1]} ${currentDays[parseInt(match[2])]} P${match[3]} (${className})`);
                    } catch (error) {
                        if (error === "ALREADY_CANCELLED") showAlert("這筆預約已經被取消了。");
                        else if (error === "NOT_OWNER") showAlert("你只能取消自己的預約。");
                        else if (error === "CART_NOT_FOUND") showAlert("找不到該設備。");
                        else showAlert("取消失敗，請稍後再試。");
                    }
                });
            };

            const upcomingBookings = useMemo(() =>
                allMyBookings.filter(b => b.week > currentRealWeek || (b.week === currentRealWeek && b.dayIdx >= currentRealDayIdx)),
                [allMyBookings, currentRealWeek, currentRealDayIdx]
            );
            const historyBookings = useMemo(() =>
                allMyBookings.filter(b => b.week < currentRealWeek || (b.week === currentRealWeek && b.dayIdx < currentRealDayIdx)),
                [allMyBookings, currentRealWeek, currentRealDayIdx]
            );
            const displayedBookings = myBookingsTab === 'upcoming' ? upcomingBookings : historyBookings;

            if (firebaseReady === 'auth-error') {
                return (
                    <div className="min-h-screen bg-duo-grayLight flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-[2rem] border-2 border-duo-grayBorder shadow-[0_8px_0_0_#e5e5e5] max-w-lg text-center">
                            <i className="fa-solid fa-triangle-exclamation text-duo-red text-6xl mb-4"></i>
                            <h2 className="text-2xl font-extrabold text-duo-text mb-4">Firebase Setup Incomplete</h2>
                            <p className="text-duo-text/80 mb-6 text-left leading-relaxed font-bold">
                                Authentication is not properly configured in your Firebase console.<br/><br/>
                                <span className="text-duo-blue uppercase tracking-wider text-sm">How to fix:</span><br/>
                                1. Go to Firebase Console -> <strong>Authentication</strong>.<br/>
                                2. Click <strong>Sign-in method</strong>.<br/>
                                3. Enable <strong>Google</strong> provider.<br/>
                                4. Save and refresh this page.
                            </p>
                            <button onClick={() => window.location.reload()} className="w-full bg-duo-green text-white font-extrabold uppercase py-4 rounded-2xl shadow-[0_4px_0_0_#58a700] active:shadow-none active:translate-y-[4px] transition-all tracking-wider">
                                Refresh Page
                            </button>
                        </div>
                    </div>
                );

            if (!firebaseReady) {
                return (

                        <i className="fa-solid fa-spinner fa-spin text-duo-green text-6xl mb-6"></i>

                                <div className="inline-block bg-white p-5 rounded-3xl border-2 border-duo-grayBorder shadow-[0_6px_0_0_#e5e5e5] mb-5">

                                </div>
                                <h1 className="text-3xl font-extrabold text-duo-text tracking-tight">室內運動場地登記表</h1>
                                <p className="text-duo-text/60 font-bold mt-2 text-lg">Indoor Sports Venue Reservation</p>
                            </div>

                            <div className="bg-white rounded-[2rem] border-2 border-duo-grayBorder shadow-[0_8px_0_0_#e5e5e5] p-8">
                                <div className="space-y-6">
